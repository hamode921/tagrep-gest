<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SEZAR PRO - لوحة التحكم المحمية</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #080808; color: #ffcc00; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; }
        .box { border: 2px solid #ffcc00; padding: 25px; border-radius: 15px; max-width: 420px; margin: 20px auto; background: #111; box-shadow: 0 0 20px rgba(255, 204, 0, 0.15); }
        input, select { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; outline: none; transition: 0.3s; }
        input:focus { border-color: #ffcc00; box-shadow: 0 0 8px rgba(255, 204, 0, 0.3); }
        .admin-input { border: 1px solid #ff0000 !important; color: #ff4444; font-weight: bold; text-align: center; }
        button { width: 95%; padding: 15px; background: #ffcc00; color: #000; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 16px; margin-top: 10px; }
        button:hover { background: #e6b800; transform: translateY(-2px); }
        .reset-btn { background: #444; color: #fff; margin-top: 20px; font-size: 13px; padding: 10px; }
        .reset-btn:hover { background: #ff0000; }
        label { display: block; text-align: right; margin-right: 20px; font-size: 12px; color: #888; margin-top: 10px; }
        #msg { font-weight: bold; margin-top: 15px; min-height: 20px; }
    </style>
</head>
<body>

    <div class="box">
        <h2 style="margin-bottom: 5px;">SEZAR PHANTOM</h2>
        <p style="color: #666; font-size: 13px; margin-bottom: 20px;">نظام إدارة التراخيص -  </p>

        <input type="password" id="adminSecret" class="admin-input" placeholder="🔐 أدخل رمز الأدمن السري">
        <hr style="border: 0.5px solid #222; margin: 20px 0;">

        <input type="text" id="userName" placeholder="اسم المشترك">
        <input type="text" id="userKey" placeholder="كود التفعيل">
        
        <label>الباقة المستهدفة:</label>
        <select id="userTierSelection">
            <option value="silver">🥈 الباقة الفضية (Silver)</option>
            <option value="gold">🥇 الباقة الذهبية (Gold)</option>
            <option value="diamond">💎 الباقة الماسية (Diamond)</option>
        </select>

        <label>صلاحية الكود:</label>
        <select id="durationDays">
            <option value="7">أسبوع واحد</option>
            <option value="30">شهر كامل</option>
            <option value="90">3 أشهر</option>
            <option value="365">سنة كاملة</option>
        </select>

        <button onclick="safeAction('ADD')">تفعيل المشترك الجديد +</button>
        
        <div style="margin-top: 30px; border-top: 1px solid #222; padding-top: 10px;">
            <input type="text" id="resetKeyInput" placeholder="كود المشترك لإعادة التعيين">
            <button class="reset-btn" onclick="safeAction('RESET')">تصفير الجهاز (Reset Device ID)</button>
        </div>

        <p id="msg"></p>
    </div>

    <script>
        // إعدادات الفايربيس (إعداداتك الأصلية)
        const firebaseConfig = {
            apiKey: "AIzaSyAzEZksgZMPbY79K_TM3mHKeW1shQ6V-lY",
            authDomain: "sezar-phantom-auth.firebaseapp.com",
            projectId: "sezar-phantom-auth",
            storageBucket: "sezar-phantom-auth.firebasestorage.app",
            messagingSenderId: "112991314655",
            appId: "1:112991314655:web:cbca0b5c0c6b6e4f51ff6a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // الرمز السري المشفر: 1992
        const MASTER_ENCODED = "MTk5Mg=="; 

        // دالة التحقق من الرمز
        function verifyAdmin() {
            const input = document.getElementById('adminSecret').value;
            return btoa(input) === MASTER_ENCODED;
        }

        async function safeAction(type) {
            const msg = document.getElementById('msg');
            
            if (!verifyAdmin()) {
                msg.style.color = "red";
                msg.innerText = "❌ الرمز السري غير صحيح!";
                return;
            }

            if (type === 'ADD') {
                const name = document.getElementById('userName').value.trim();
                const key = document.getElementById('userKey').value.trim();
                const tier = document.getElementById('userTierSelection').value;
                const days = parseInt(document.getElementById('durationDays').value);

                if (!name || !key) {
                    msg.style.color = "orange";
                    msg.innerText = "⚠️ أكمل البيانات أولاً";
                    return;
                }

                let expiry = new Date();
                expiry.setDate(expiry.getDate() + days);

                try {
                    await db.collection("users").doc(key).set({
                        name: name,
                        key: key,
                        tier: tier,
                        expiryDate: expiry.toISOString(),
                        active: true,
                        deviceId: ""
                    });
                    msg.style.color = "lime";
                    msg.innerText = "✅ تم تفعيل الكود بنجاح!";
                    document.getElementById('userName').value = "";
                    document.getElementById('userKey').value = "";
                } catch (e) {
                    msg.style.color = "red";
                    msg.innerText = "❌ خطأ: " + e.message;
                }

            } else if (type === 'RESET') {
                const key = document.getElementById('resetKeyInput').value.trim();
                if (!key) return;

                try {
                    await db.collection("users").doc(key).update({ deviceId: "" });
                    msg.style.color = "cyan";
                    msg.innerText = "🔄 تم تصفير جهاز المشترك بنجاح.";
                } catch (e) {
                    msg.style.color = "red";
                    msg.innerText = "❌ الكود غير موجود!";
                }
            }
        }
    </script>
</body>
</html>
