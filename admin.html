<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SEZAR لوحة التحكم</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #0b0b0b; color: #ffcc00; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { border: 2px solid #ffcc00; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; background: #1a1a1a; }
        input, select { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ffcc00; background: #000; color: #fff; }
        button { width: 95%; padding: 12px; background: #ffcc00; color: #000; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h3>إضافة مشترك جديد (نظام سيزو)</h3>
        <input type="text" id="userName" placeholder="اسم المشترك">
        <input type="text" id="userKey" placeholder="كود التفعيل">
        <select id="duration">
            <option value="7">أسبوع واحد</option>
            <option value="30">شهر كامل</option>
            <option value="365">سنة كاملة</option>
        </select>
        <button onclick="addUser()">تفعيل المشترك +</button>
        <p id="msg"></p>
    </div>

    <script>
        // إعدادات مشروع سيزو من الصور
        const firebaseConfig = {
            apiKey: "AIzaSyAzEZksgZMPbY79K_TM3mHKeW1shQ6V-lY",
            authDomain: "sezar-phantom-auth.firebaseapp.com",
            projectId: "sezar-phantom-auth",
            storageBucket: "sezar-phantom-auth.firebasestorage.app",
            messagingSenderId: "112991314655",
            appId: "1:112991314655:web:cbca0b5c0c6b6e4f51ff6a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function addUser() {
            const name = document.getElementById('userName').value;
            const key = document.getElementById('userKey').value;
            const days = parseInt(document.getElementById('duration').value);
            const msg = document.getElementById('msg');

            let expiry = new Date();
            expiry.setDate(expiry.getDate() + days);

            db.collection("users").doc(key).set({
                name: name,
                key: key,
                expiry: expiry.toISOString().split('T')[0],
                active: true,
                deviceId: null
            }).then(() => {
                msg.style.color = "lime";
                msg.innerText = "✅ تم الإرسال للخزنة بنجاح!";
            }).catch((e) => {
                msg.style.color = "red";
                msg.innerText = "❌ فشل: " + e.message;
            });
        }
    </script>
</body>
</html>
