<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SEZAR لوحة التحكم - نظام الحماية المطور</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #0b0b0b; color: #ffcc00; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { border: 2px solid #ffcc00; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; background: #1a1a1a; box-shadow: 0 0 15px rgba(255, 204, 0, 0.2); }
        input, select { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ffcc00; background: #000; color: #fff; outline: none; }
        button { width: 95%; padding: 15px; background: #ffcc00; color: #000; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 16px; margin-top: 10px; }
        button:hover { background: #e6b800; transform: scale(1.02); }
        .reset-btn { background: #ef4444; color: white; margin-top: 20px; font-size: 12px; padding: 10px; }
        label { display: block; text-align: right; margin-right: 20px; font-size: 12px; color: #aaa; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h3>إضافة مشترك جديد (نظام سيزو)</h3>
        <p style="font-size: 10px; color: #888;">النظام سيقفل الكود على أول جهاز يستخدمه تلقائياً</p>
        
        <input type="text" id="userName" placeholder="اسم المشترك">
        <input type="text" id="userKey" placeholder="كود التفعيل">
        
        <label>اختر باقة المشترك (Tier):</label>
        <select id="userTierSelection">
            <option value="silver">🥈 الباقة الفضية (Silver)</option>
            <option value="gold">🥇 الباقة الذهبية (Gold)</option>
            <option value="diamond">💎 الباقة الماسية (Diamond)</option>
        </select>

        <label>مدة الاشتراك:</label>
        <select id="durationDays">
            <option value="7">أسبوع واحد</option>
            <option value="30">شهر كامل</option>
            <option value="90">3 أشهر</option>
            <option value="365">سنة كاملة</option>
        </select>

        <button onclick="addUser()">تفعيل المشترك +</button>

        <hr style="border: 0.5px solid #333; margin: 20px 0;">
        
        <label>لإعادة فتح كود (في حال تغيير الجهاز):</label>
        <input type="text" id="resetKey" placeholder="أدخل الكود المراد تصفيره">
        <button class="reset-btn" onclick="resetDevice()">إعادة تعيين قفل الجهاز (Reset)</button>
        
        <p id="msg"></p>
    </div>

    <script>
        // إعدادات الفايربيس - كما هي في مشروعك
        const firebaseConfig = {
            apiKey: "AIzaSyAzEZksgZMPbY79K_TM3mHKeW1shQ6V-lY",
            authDomain: "sezar-phantom-auth.firebaseapp.com",
            projectId: "sezar-phantom-auth",
            storageBucket: "sezar-phantom-auth.firebasestorage.app",
            messagingSenderId: "112991314655",
            appId: "1:112991314655:web:cbca0b5c0c6b6e4f51ff6a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // دالة إضافة مشترك مع تصفير بصمة الجهاز
        function addUser() {
            const name = document.getElementById('userName').value;
            const key = document.getElementById('userKey').value;
            const tierValue = document.getElementById('userTierSelection').value; 
            const days = parseInt(document.getElementById('durationDays').value);
            const msg = document.getElementById('msg');

            if(!name || !key) {
                msg.style.color = "red";
                msg.innerText = "❌ يرجى ملء كافة الحقول!";
                return;
            }

            let expiry = new Date();
            expiry.setDate(expiry.getDate() + days);

            db.collection("users").doc(key).set({
                name: name,
                key: key,
                tier: tierValue,
                expiryDate: expiry.toISOString(),
                active: true,
                deviceId: null // هنا السر: الكود يكون "غير مربوط" حتى يفتحه المستخدم
            }).then(() => {
                msg.style.color = "lime";
                msg.innerText = "✅ تم الإضافة بنجاح وقفل الهاردوير جاهز!";
                document.getElementById('userName').value = "";
                document.getElementById('userKey').value = "";
            }).catch((e) => {
                msg.style.color = "red";
                msg.innerText = "❌ فشل: " + e.message;
            });
        }

        // دالة مسح بصمة الجهاز (في حال المشترك غير تلفونه)
        function resetDevice() {
            const key = document.getElementById('resetKey').value;
            const msg = document.getElementById('msg');
            
            if(!key) {
                msg.innerText = "❌ أدخل الكود أولاً!";
                return;
            }

            db.collection("users").doc(key).update({
                deviceId: null
            }).then(() => {
                msg.style.color = "cyan";
                msg.innerText = "✅ تم تصفير الجهاز.. يمكن للمشترك الدخول بجهاز جديد الآن.";
            }).catch((e) => {
                msg.style.color = "red";
                msg.innerText = "❌ الكود غير موجود!";
            });
        }
    </script>
</body>
</html>
