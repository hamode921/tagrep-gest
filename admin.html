<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SEZAR لوحة التحكم - نظام الباقات الموحد</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #0b0b0b; color: #ffcc00; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { border: 2px solid #ffcc00; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; background: #1a1a1a; box-shadow: 0 0 15px rgba(255, 204, 0, 0.2); margin-bottom: 20px; }
        input, select { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ffcc00; background: #000; color: #fff; outline: none; }
        button { width: 95%; padding: 15px; background: #ffcc00; color: #000; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 16px; }
        button:hover { background: #e6b800; transform: scale(1.02); }
        .reset-btn { background: #ef4444; color: #fff; margin-top: 10px; }
        .reset-btn:hover { background: #dc2626; }
        label { display: block; text-align: right; margin-right: 20px; font-size: 12px; color: #aaa; margin-top: 10px; }
        #msg { font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="box">
        <h3>إضافة مشترك جديد (نظام سيزو)</h3>
        <p style="font-size: 10px; color: #888;">النظام سيقفل الكود على أول جهاز يستخدمه تلقائياً</p>
        
        <input type="text" id="userName" placeholder="اسم المشترك">
        <input type="text" id="userKey" placeholder="كود التفعيل">
        
        <label>اختر باقة المشترك (Tier):</label>
        <select id="userTierSelection">
            <option value="silver">🥈 الباقة الفضية (Silver)</option>
            <option value="gold">🥇 الباقة الذهبية (Gold)</option>
            <option value="diamond">💎 الباقة الماسية (Diamond)</option>
        </select>

        <label>مدة الاشتراك:</label>
        <select id="durationDays">
            <option value="7">أسبوع واحد</option>
            <option value="30">شهر كامل</option>
            <option value="90">3 أشهر</option>
            <option value="365">سنة كاملة</option>
        </select>

        <button onclick="addUser()">تفعيل المشترك +</button>
    </div>

    <div class="box" style="border-color: #ef4444;">
        <h4 style="color: #ef4444;">لإعادة فتح كود (في حال تغيير الجهاز)</h4>
        <input type="text" id="resetKeyInput" placeholder="أدخل الكود المراد تصفيره">
        <button class="reset-btn" onclick="resetDevice()">إعادة تعيين قفل الجهاز (Reset)</button>
    </div>

    <p id="msg"></p>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAzEZksgZMPbY79K_TM3mHKeW1shQ6V-lY",
            authDomain: "sezar-phantom-auth.firebaseapp.com",
            projectId: "sezar-phantom-auth",
            storageBucket: "sezar-phantom-auth.firebasestorage.app",
            messagingSenderId: "112991314655",
            appId: "1:112991314655:web:cbca0b5c0c6b6e4f51ff6a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // وظيفة إضافة مشترك
        function addUser() {
            const name = document.getElementById('userName').value.trim();
            const key = document.getElementById('userKey').value.trim();
            const tierValue = document.getElementById('userTierSelection').value; 
            const days = parseInt(document.getElementById('durationDays').value);
            const msg = document.getElementById('msg');

            if(!name || !key) {
                msg.style.color = "red";
                msg.innerText = "❌ يرجى ملء كافة الحقول!";
                return;
            }

            let expiry = new Date();
            expiry.setDate(expiry.getDate() + days);

            db.collection("users").doc(key).set({
                name: name,
                key: key,
                tier: tierValue,
                expiryDate: expiry.toISOString(),
                active: true,
                deviceId: "" // البداية دائماً فارغة للربط
            }).then(() => {
                msg.style.color = "lime";
                msg.innerText = "✅ تم تفعيل [" + tierValue.toUpperCase() + "] بنجاح!";
                document.getElementById('userName').value = "";
                document.getElementById('userKey').value = "";
            }).catch((e) => {
                msg.style.color = "red";
                msg.innerText = "❌ فشل: " + e.message;
            });
        }

        // وظيفة الـ Reset (الجراحية)
        async function resetDevice() {
            const keyToReset = document.getElementById('resetKeyInput').value.trim();
            const msg = document.getElementById('msg');

            if(!keyToReset) {
                msg.style.color = "red";
                msg.innerText = "❌ أدخل الكود المراد تصفيره أولاً!";
                return;
            }

            try {
                const userRef = db.collection("users").doc(keyToReset);
                const doc = await userRef.get();

                if (doc.exists) {
                    await userRef.update({ deviceId: "" });
                    msg.style.color = "lime";
                    msg.innerText = "✅ تم تصفير البصمة.. الكود متاح الآن لجهاز جديد!";
                    document.getElementById('resetKeyInput').value = "";
                } else {
                    msg.style.color = "red";
                    msg.innerText = "❌ الكود غير موجود!";
                }
            } catch (e) {
                msg.style.color = "red";
                msg.innerText = "❌ خطأ: " + e.message;
            }
        }
    </script>
</body>
</html>
