<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEZAR-PHANTOM | ALPHA LIVE RADAR</title>
    <style>
        :root { --gold: #ffcc00; --bg: #000; --card: #080808; --cyan: #00d2ff; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; padding: 15px; margin: 0; }
        .header { border: 2px solid var(--gold); border-radius: 12px; padding: 15px; margin-bottom: 20px; text-align: center; box-shadow: 0 0 15px rgba(255, 204, 0, 0.2); }
        .alpha-count { font-size: 12px; color: var(--gold); margin-top: 5px; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        
        /* تصميم كارت الألفا */
        .alpha-card { background: var(--card); border: 1px solid #1a1a1a; border-radius: 15px; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: relative; overflow: hidden; }
        .alpha-card::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 4px; background: var(--gold); }
        
        .price-section { text-align: left; }
        .p-main { font-size: 22px; font-weight: 900; color: var(--cyan); }
        .p-change { font-size: 14px; font-weight: bold; }
        .up { color: #22c55e; } .down { color: #ef4444; }

        .info-section { text-align: right; }
        .symbol-name { font-size: 20px; font-weight: bold; color: var(--gold); }
        .tag { background: #332200; color: var(--gold); padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; border: 1px solid var(--gold); }
        .vol-text { font-size: 11px; color: #555; margin-top: 5px; }

        .loading { color: var(--gold); text-align: center; margin-top: 50px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0; font-size: 26px;">「 SEZAR-PHANTOM ALPHA 」</h1>
        <div class="alpha-count" id="count">SCANNING BINANCE SOURCE...</div>
    </div>

    <div id="alpha-list" class="grid">
        <div class="loading">... جاري اختراق سيرفرات الألفا وقنص العملات الحية</div>
    </div>

    <script>
        // الرادار الذكي يشبك على "المصدر العام" لبايننس
        async function scanBinanceAlpha() {
            try {
                // سحب بيانات كل أزواج التداول اللحظية
                const response = await fetch('https://api.binance.com/api/v3/ticker/24hr');
                const marketData = await response.json();

                // سحب قائمة الفيوتشرز لاستبعادها (حتى يصفى لنا فقط الألفا/سبوت الجديد)
                const futRes = await fetch('https://fapi.binance.com/fapi/v1/exchangeInfo');
                const futData = await futRes.json();
                const futSymbols = new Set(futData.symbols.map(s => s.symbol));

                // فلترة السورس: (USDT فقط) + (ليست فيوتشرز) + (حجم تداول نشط)
                // هذا الفلتر يلقط أي عملة جديدة تنزل بالـ Alpha Hub تلقائياً
                const alphaSource = marketData.filter(coin => {
                    return coin.symbol.endsWith('USDT') && 
                           !futSymbols.has(coin.symbol) && 
                           parseFloat(coin.quoteVolume) > 500000; // قنص العملات اللي سيولتها فوق نص مليون
                });

                // ترتيب العملات حسب الانفجار السعري
                alphaSource.sort((a, b) => parseFloat(b.priceChangePercent) - parseFloat(a.priceChangePercent));

                const listCont = document.getElementById('alpha-list');
                const countCont = document.getElementById('count');
                listCont.innerHTML = '';
                countCont.innerText = `LIVE: ${alphaSource.length} ALPHA COINS DETECTED`;

                alphaSource.forEach(c => {
                    const change = parseFloat(c.priceChangePercent);
                    const changeClass = change >= 0 ? 'up' : 'down';
                    
                    listCont.innerHTML += `
                        <div class="alpha-card">
                            <div class="price-section">
                                <div class="p-change ${changeClass}">${change >= 0 ? '▲' : '▼'} ${change}%</div>
                                <div class="p-main">$${parseFloat(c.lastPrice).toLocaleString(undefined, {minimumFractionDigits: 2})}</div>
                            </div>
                            <div class="info-section">
                                <span class="tag">LIVE ALPHA</span>
                                <div class="symbol-name">${c.symbol.replace('USDT', '')}<span style="font-size:12px; color:#444;">/USDT</span></div>
                                <div class="vol-text">24h Vol: ${(parseFloat(c.quoteVolume)/1000000).toFixed(2)}M</div>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                console.error("Alpha Server Error");
            }
        }

        // تحديث الرادار كل 3 ثواني (قناص حقيقي)
        setInterval(scanBinanceAlpha, 3000);
        scanBinanceAlpha();
    </script>
</body>
</html>
