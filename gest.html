<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEZAR-PHANTOM PRO ULTIMATE</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --gold: #fbbf24; --bg: #000; --red: #ef4444; }
        body { background: var(--bg); color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 10px; overflow-x: hidden; }
        
        /* شاشة الدخول */
        .lock-box { border: 2px solid var(--gold); padding: 30px; text-align: center; background: #000; margin-top: 15vh; border-radius: 15px; width: 300px; }
        input.pass { background: #111; border: 1px solid #333; color: var(--gold); padding: 12px; text-align: center; margin-bottom: 20px; width: 90%; outline: none; border-radius: 5px; font-size: 18px; }
        button.login-btn { background: var(--gold); color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 8px; width: 100%; font-size: 18px; }

        /* شاشة البحث والرادار */
        #search-screen, #radar-ui { display: none; width: 100%; max-width: 450px; text-align: center; }
        .search-input { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 18px; width: 95%; border-radius: 15px; font-size: 16px; outline: none; text-align: center; margin-bottom: 20px; }
        .coin-item { background: #080808; border: 1px solid #222; padding: 15px; border-radius: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        
        /* أزرار الفريمات */
        .tf-btn { background: #111; color: #888; border: 1px solid #333; padding: 6px 12px; cursor: pointer; border-radius: 5px; font-size: 12px; margin: 2px; transition: 0.3s; }
        .tf-btn.active { background: var(--gold); color: #000; border-color: var(--gold); font-weight: bold; }

        /* حاوية الشارت */
        #chart-container { width: 100%; height: 320px; margin: 15px 0; border: 1px solid #222; border-radius: 12px; overflow: hidden; background: #000; }

        .price-box { border: 1px dashed #555; padding: 12px; text-align: center; font-size: 30px; font-weight: 900; background: #0a0a0a; color: #00d2ff; margin-bottom: 10px; }
        .row { display: flex; justify-content: space-between; padding: 10px 5px; border-bottom: 1px solid #111; font-size: 13px; }
        .contact-dev { position: fixed; bottom: 0; width: 100%; background: #000; padding: 15px 0; display: flex; justify-content: space-around; border-top: 1px solid #222; z-index: 100; }
        .contact-dev a { color: var(--gold); text-decoration: none; border: 1px solid var(--gold); padding: 8px 16px; border-radius: 5px; font-size: 12px; }
    </style>
</head>
<body onload="checkSaved()">

    <div id="auth-screen" class="lock-box">
        <div style="color:var(--gold); font-weight:bold; margin-bottom:20px;">🔒 SEZAR-PHANTOM PRO</div>
        <input type="password" id="pass-key" class="pass" placeholder="كود التفعيل">
        <button onclick="activate()" class="login-btn">دخول</button>
        <div id="error-msg" style="color:var(--red); font-size:11px; margin-top:10px; display:none;">❌ الكود خطأ</div>
    </div>

    <div id="search-screen">
        <h2 style="color:var(--gold);">「 SEZAR-PHANTOM 」</h2>
        <input type="text" class="search-input" id="search-input" placeholder="🔍 ابحث عن عملة..." oninput="searchCoins()">
        <div id="results-list"></div>
    </div>

    <div id="radar-ui">
        <div style="border:1px solid var(--gold); padding:10px; border-radius:8px; position:relative; margin-bottom:15px;">
            <button onclick="goBack()" style="position:absolute; left:10px; top:10px; background:var(--gold); border:none; padding:5px 10px; border-radius:5px; font-size:12px; font-weight:bold; cursor:pointer;">🔙</button>
            <h3 id="current-coin-name" style="margin:0; color:var(--gold); letter-spacing: 1px;">[ BTCUSDT ]</h3>
        </div>

        <div class="price-box" id="coin-price">Loading...</div>

        <div id="timeframes">
            <button class="tf-btn active" onclick="changeTF('1m', this)">1m</button>
            <button class="tf-btn" onclick="changeTF('15m', this)">15m</button>
            <button class="tf-btn" onclick="changeTF('1h', this)">1h</button>
            <button class="tf-btn" onclick="changeTF('4h', this)">4h</button>
            <button class="tf-btn" onclick="changeTF('1d', this)">1d</button>
        </div>

        <div id="chart-container"></div>

        <div id="buy-sell-per" style="text-align:center; padding:10px; font-weight:bold; color: #bbb;">BUY: --% | SELL: --%</div>
        <div id="s-walls"></div>
        <div id="b-walls" style="margin-top:15px; margin-bottom:80px;"></div>

        <div class="contact-dev"><a href="https://t.me/se44se">✈️ تليجرام المطور</a></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAzEZksgZMPbY79K_TM3mHKeW1shQ6V-lY",
            authDomain: "sezar-phantom-auth.firebaseapp.com",
            projectId: "sezar-phantom-auth",
            storageBucket: "sezar-phantom-auth.firebasestorage.app",
            messagingSenderId: "112991314655",
            appId: "1:112991314655:web:cbca0b5c0c6b6e4f51ff6a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let allCoins = [], pInt, lInt, chart, candleSeries, currentTF = '1m', currentSymbol = '';

        async function checkSaved() {
            const k = localStorage.getItem('sz_key');
            if (k) {
                const doc = await db.collection("users").doc(k).get();
                if (doc.exists) showSearch();
                else localStorage.clear();
            }
        }

        async function activate() { 
            const k = document.getElementById('pass-key').value;
            if(!k) return;
            const doc = await db.collection("users").doc(k).get();
            if (doc.exists) { localStorage.setItem('sz_key', k); showSearch(); }
            else { document.getElementById('error-msg').style.display='block'; }
        }

        async function showSearch() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('search-screen').style.display = 'block';
            document.getElementById('radar-ui').style.display = 'none';
            if (allCoins.length === 0) {
                const r = await fetch('https://fapi.binance.com/fapi/v1/exchangeInfo');
                const d = await r.json();
                allCoins = d.symbols.filter(s => s.symbol.endsWith('USDT')).map(s => s.symbol);
            }
            searchCoins();
        }

        function searchCoins() {
            const q = document.getElementById('search-input').value.toUpperCase();
            const list = document.getElementById('results-list'); list.innerHTML = '';
            allCoins.filter(c => c.includes(q)).slice(0, 8).forEach(c => {
                const item = document.createElement('div');
                item.className = 'coin-item';
                item.innerHTML = `<span>${c}</span><span style="color:var(--gold)">تحليل 🔭</span>`;
                item.onclick = () => startRadar(c); list.appendChild(item);
            });
        }

        function startRadar(s) {
            currentSymbol = s;
            document.getElementById('search-screen').style.display = 'none';
            document.getElementById('radar-ui').style.display = 'block';
            document.getElementById('current-coin-name').innerText = `[ ${s} ]`;
            
            initChart();
            updatePrice(s); 
            updateLiq(s);
            loadChartData(s, currentTF);

            pInt = setInterval(() => updatePrice(s), 2000); 
            lInt = setInterval(() => updateLiq(s), 30000);
        }

        function initChart() {
            const container = document.getElementById('chart-container');
            container.innerHTML = '';
            chart = LightweightCharts.createChart(container, {
                layout: { backgroundColor: '#000', textColor: '#aaa', fontSize: 11 },
                grid: { vertLines: { color: '#111' }, horzLines: { color: '#111' } },
                timeScale: { borderColor: '#222', timeVisible: true },
                rightPriceScale: { borderColor: '#222' }
            });
            candleSeries = chart.addCandlestickSeries({
                upColor: '#22c55e', downColor: '#ef4444', 
                borderUpColor: '#22c55e', borderDownColor: '#ef4444',
                wickUpColor: '#22c55e', wickDownColor: '#ef4444'
            });
        }

        async function loadChartData(s, tf) {
            const res = await fetch(`https://fapi.binance.com/fapi/v1/klines?symbol=${s}&interval=${tf}&limit=120`);
            const data = await res.json();
            const candles = data.map(d => ({
                time: d[0] / 1000,
                open: parseFloat(d[1]), high: parseFloat(d[2]),
                low: parseFloat(d[3]), close: parseFloat(d[4])
            }));
            candleSeries.setData(candles);
        }

        function changeTF(tf, btn) {
            currentTF = tf;
            document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            loadChartData(currentSymbol, tf);
        }

        async function updatePrice(s) {
            const res = await fetch(`https://fapi.binance.com/fapi/v1/ticker/price?symbol=${s}`);
            const data = await res.json();
            document.getElementById('coin-price').innerText = '$' + parseFloat(data.price).toLocaleString();
        }

        async function updateLiq(s) {
            const res = await fetch(`https://fapi.binance.com/fapi/v1/depth?symbol=${s}&limit=500`);
            const data = await res.json();
            let b = data.bids.map(x => ({p: x[0], v: x[0]*x[1]})), a = data.asks.map(x => ({p: x[0], v: x[0]*x[1]}));
            let tB = b.reduce((s,x)=>s+x.v,0), tS = a.reduce((s,x)=>s+x.v,0);
            document.getElementById('buy-sell-per').innerText = `BUY: ${(tB/(tB+tS)*100).toFixed(1)}% | SELL: ${(tS/(tB+tS)*100).toFixed(1)}%`;
            const render = (target, list) => {
                document.getElementById(target).innerHTML = list.sort((x,y)=>y.v-x.v).slice(0,3).map(x => `
                    <div class="row"><span>Vol: ${(x.v/1000000).toFixed(2)}M</span><span>$${parseFloat(x.p).toLocaleString()}</span></div>
                `).join('');
            };
            render('s-walls', a); render('b-walls', b);
        }

        function goBack() { clearInterval(pInt); clearInterval(lInt); showSearch(); }
    </script>
</body>
</html>
