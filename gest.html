<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEZAR-PHANTOM PRO</title>
    <style>
        :root { --gold: #fbbf24; --ghost: #a855f7; --bg: #000; --card: #080808; --red: #ef4444; --green: #22c55e; }
        body { background: var(--bg); color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        
        .lock-box { border: 2px solid var(--gold); padding: 30px; text-align: center; background: #000; margin-top: 15vh; border-radius: 15px; width: 300px; }
        .lock-header { color: var(--gold); font-size: 14px; font-weight: bold; margin-bottom: 20px; direction: ltr; }
        .secure-note { color: #888; font-size: 11px; margin-bottom: 15px; line-height: 1.6; }
        input { background: #111; border: 1px solid #333; color: var(--gold); padding: 12px; text-align: center; margin-bottom: 20px; width: 95%; outline: none; border-radius: 5px; font-size: 18px; }
        button { background: var(--gold); color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 8px; width: 100%; font-size: 18px; margin-bottom: 20px; }
        .auth-links { display: flex; justify-content: space-around; width: 100%; border-top: 1px solid #222; padding-top: 15px; }
        .auth-links a { color: var(--gold); text-decoration: none; font-size: 10px; border: 1px solid var(--gold); padding: 5px 10px; border-radius: 4px; }

        #radar-ui { display: none; width: 100%; max-width: 450px; padding-bottom: 80px; }
        .header { border: 1px solid var(--gold); padding: 5px; text-align: center; margin-bottom: 15px; border-radius: 5px; }
        .header h2 { margin: 0; font-size: 16px; color: var(--gold); letter-spacing: 2px; }
        .header p { margin: 0; font-size: 11px; color: #ffffff !important; font-weight: bold; }

        .price-box { border: 1px dashed #555; padding: 15px; text-align: center; font-size: 32px; font-weight: 900; margin-bottom: 5px; background: #0a0a0a; color: #00d2ff; }
        .timer-text { text-align:center; font-size:10px; color: var(--gold); margin-bottom: 12px; font-weight: bold; }
        
        #buy-sell-per { text-align:center; font-weight:bold; margin-bottom:5px; font-size: 14px; }
        #power-bar { text-align:center; margin-bottom:20px; letter-spacing:3px; display: flex; justify-content: center; gap: 4px; flex-wrap: wrap; }
        .ball { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }

        .ice-card { background: var(--card); border: 1px solid var(--ghost); padding: 15px; border-radius: 12px; margin-top: 20px; width: 100%; box-sizing: border-box; }
        .ice-title { font-size: 11px; color: var(--ghost); margin-bottom: 10px; display: flex; justify-content: space-between; font-weight: bold; }
        .ice-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #111; font-size: 12px; }
        .row { display: flex; justify-content: space-between; padding: 12px 5px; border-bottom: 1px solid #111; font-size: 13px; }
        .perc-tag { color: var(--gold); font-size: 10px; background: rgba(251, 191, 36, 0.1); padding: 2px 8px; border-radius: 10px; }
        
        #sig-box { text-align: center; font-weight: bold; padding: 15px; margin-top: 30px; border-radius: 5px; font-size: 16px; width: 100%; }
        .sig-bullish { background: #064e3b; color: #22c55e; border: 1px solid #22c55e; }
        .sig-bearish { background: #450a0a; color: #ef4444; border: 1px solid #ef4444; }
        .contact-dev { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.8); padding: 15px 0; display: flex; justify-content: space-around; border-top: 1px solid #222; }
        .contact-dev a { color: var(--gold); text-decoration: none; font-size: 11px; border: 1px solid var(--gold); padding: 8px 16px; border-radius: 5px; }
    </style>
</head>
<body onload="checkAuth()">

    <div id="auth-screen" class="lock-box">
        <div class="lock-header">🔒 تفعيل SEZAR-PHANTOM PRO</div>
        <div class="secure-note">هذا الكود يعمل على جهاز واحد فقط<br>ولا يعمل على غيره نهائياً</div>
        <input type="password" id="pass-key" placeholder="•••••">
        <button onclick="activate()">تسجيل دخول</button>
        <div class="auth-links">
            <a href="https://t.me/se44se">✈️ تليجرام</a>
            <a href="mailto:sezarphantom@gmail.com">📧 الإيميل</a>
        </div>
    </div>

    <div id="radar-ui">
        <div class="header"><h2>「 SEZAR-PHANTOM 」</h2><p>[ BTCUSDT ]</p></div>
        <div class="price-box" id="coin-price">Loading...</div>
        <div class="timer-text">تحديث السيولة خلال: <span id="timer">30</span> ثانية</div>
        <div id="buy-sell-per">BUY: --% | SELL: --%</div>
        <div id="power-bar"></div>
        
        <div id="s-walls"></div>
        <div id="b-walls" style="margin-top:20px;"></div>
        <div class="ice-card">
            <div class="ice-title"><span>ICEBERG DETECTOR (+50K)</span><span id="ice-status" style="background:#064e3b; color:#22c55e; padding:2px 5px; border-radius:3px;">BOTS & WHALES</span></div>
            <div id="iceberg-list"></div>
        </div>
        <div id="sig-box">ANALYZING...</div>
        <div class="contact-dev"><a href="https://t.me/se44se">✈️ تليجرام</a><a href="mailto:sezarphantom@gmail.com">📧 الإيميل</a></div>
    </div>

    <script>
        const KEYS = ["SZ_01", "SZ_010", "SZ_040", "SZ_050", "SZ_08"];
        const SYMBOL = 'BTCUSDT';
        let lastBids = [], lastAsks = [], timeLeft = 30;

        function checkAuth() {
            if (localStorage.getItem('sezar_auth') === 'true') { showRadar(); }
        }

        function activate() {
            if (KEYS.includes(document.getElementById('pass-key').value)) {
                localStorage.setItem('sezar_auth', 'true');
                showRadar();
            } else { alert("الكود خطأ!"); }
        }

        function showRadar() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('radar-ui').style.display = 'block';
            setInterval(updatePrice, 1000);
            setInterval(updateLiquidity, 30000);
            setInterval(updateIceberg, 1000);
            setInterval(() => { timeLeft--; if(timeLeft<0) timeLeft=30; document.getElementById('timer').innerText = timeLeft; }, 1000);
            updateLiquidity();
        }

        async function updatePrice() {
            try {
                const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${SYMBOL}`);
                const data = await res.json();
                document.getElementById('coin-price').innerText = '$' + parseFloat(data.price).toLocaleString(undefined, {minimumFractionDigits: 2});
            } catch (e) {}
        }

        async function updateLiquidity() {
            timeLeft = 30;
            try {
                const res = await fetch(`https://api.binance.com/api/v3/depth?symbol=${SYMBOL}&limit=5000`);
                const data = await res.json();
                let bids = data.bids.map(b => ({p: parseFloat(b[0]), liq: parseFloat(b[0]) * parseFloat(b[1])}));
                let asks = data.asks.map(a => ({p: parseFloat(a[0]), liq: parseFloat(a[0]) * parseFloat(a[1])}));
                let tB = bids.reduce((s,b)=>s+b.liq,0), tS = asks.reduce((s,a)=>s+a.liq,0);
                let buyP = (tB/(tB+tS)*100), sellP = 100 - buyP;

                document.getElementById('buy-sell-per').innerText = `BUY: ${buyP.toFixed(1)}% | SELL: ${sellP.toFixed(1)}%`;
                
                let buyCount = Math.round(buyP / 6.6), sellCount = 15 - buyCount;
                document.getElementById('power-bar').innerHTML = 
                    '<div class="ball" style="background:var(--red)"></div>'.repeat(sellCount) + 
                    '<div class="ball" style="background:var(--green)"></div>'.repeat(buyCount);

                const sig = document.getElementById('sig-box');
                sig.innerText = buyP > 50 ? "🟢 SIGNAL: BULLISH" : "🔴 SIGNAL: BEARISH";
                sig.className = buyP > 50 ? "sig-bullish" : "sig-bearish";

                let whaleAsks = [...asks].sort((a,b) => b.liq - a.liq).slice(0, 3).sort((a,b) => a.p - b.p);
                document.getElementById('s-walls').innerHTML = `<div style="color:var(--red); font-weight:bold; border-bottom: 1px solid #333; padding-bottom:5px;">🔴 SELL WALLS (30s):</div>` + 
                whaleAsks.map(a => `<div class="row"><span>Vol: ${(a.liq/1000000).toFixed(2)}M</span><span class="perc-tag">${((a.liq/tS)*100).toFixed(2)}%</span><span>$${a.p.toLocaleString()}</span></div>`).join('');
                let whaleBids = [...bids].sort((a,b) => b.liq - a.liq).slice(0, 3).sort((a,b) => a.p - b.p);
                document.getElementById('b-walls').innerHTML = `<div style="color:var(--green); font-weight:bold; border-bottom: 1px solid #333; padding-bottom:5px;">🟢 BUY WALLS (30s):</div>` + 
                whaleBids.map(b => `<div class="row"><span>Vol: ${(b.liq/1000000).toFixed(2)}M</span><span class="perc-tag">${((b.liq/tB)*100).toFixed(2)}%</span><span>$${b.p.toLocaleString()}</span></div>`).join('');
            } catch (e) {}
        }

        async function updateIceberg() {
            try {
                const res = await fetch(`https://api.binance.com/api/v3/depth?symbol=${SYMBOL}&limit=5`);
                const data = await res.json();
                let bids = data.bids, asks = data.asks;
                let found = [];
                if (lastBids.length > 0 && bids[0][0] === lastBids[0][0]) {
                    let d = parseFloat(bids[0][1]) - parseFloat(lastBids[0][1]);
                    let amt = d * bids[0][0]; 
                    if (amt > 50000) found.push({p: bids[0][0], m: amt, t: 'Buyer'}); // فلتر +50K
                }
                if (lastAsks.length > 0 && asks[0][0] === lastAsks[0][0]) {
                    let d = parseFloat(asks[0][1]) - parseFloat(lastAsks[0][1]);
                    let amt = d * asks[0][0]; 
                    if (amt > 50000) found.push({p: asks[0][0], m: amt, t: 'Seller'}); // فلتر +50K
                }
                if(found.length > 0) {
                    const list = document.getElementById('iceberg-list');
                    found.forEach(ice => {
                        const row = document.createElement('div'); row.className = 'ice-row';
                        const mVal = ice.m >= 1000000 ? (ice.m/1000000).toFixed(2) + "M" : (ice.m/1000).toFixed(1) + "K";
                        row.innerHTML = `<span style="color:${ice.t==='Buyer'?'var(--green)':'var(--red)'}">${ice.t.toUpperCase()}</span><span style="color:var(--gold)">$${mVal}</span><span>$${parseFloat(ice.p).toLocaleString()}</span>`;
                        list.prepend(row); if (list.children.length > 5) list.removeChild(list.lastChild);
                    });
                }
                lastBids = bids; lastAsks = asks;
            } catch (e) {}
        }
    </script>
</body>
</html>
