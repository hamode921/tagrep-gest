<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEZAR-PHANTOM PRO REAL-TIME</title>
    <style>
        :root { --gold: #fbbf24; --ghost: #a855f7; --bg: #000; --card: #0a0a0a; --red: #ef4444; --green: #22c55e; }
        body { background: var(--bg); color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        
        /* واجهة القفل */
        .lock-box { border: 2px solid var(--gold); padding: 30px; text-align: center; background: #000; margin-top: 15vh; border-radius: 15px; width: 300px; }
        .secure-note { color: #888; font-size: 11px; margin-bottom: 15px; line-height: 1.6; }
        input.pass { background: #111; border: 1px solid #333; color: var(--gold); padding: 12px; text-align: center; margin-bottom: 20px; width: 95%; outline: none; border-radius: 5px; font-size: 18px; }
        button.login-btn { background: var(--gold); color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 8px; width: 100%; font-size: 18px; margin-bottom: 20px; }

        /* شاشة البحث */
        #search-screen { display: none; width: 100%; max-width: 450px; text-align: center; margin-top: 20px; }
        .sezar-brand { margin-bottom: 30px; }
        .sezar-brand .sub-text { font-size: 28px; font-weight: bold; color: var(--gold); text-shadow: 0 0 15px rgba(251, 191, 36, 0.5); }
        .search-input { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 18px; width: 95%; border-radius: 15px; font-size: 16px; outline: none; text-align: center; margin-bottom: 30px; }
        .coin-item { background: #080808; border: 1px solid #222; padding: 15px; border-radius: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }

        /* واجهة الرادار */
        #radar-ui { display: none; width: 100%; max-width: 450px; padding-bottom: 80px; }
        .header { border: 1px solid var(--gold); padding: 15px 5px; text-align: center; margin-bottom: 15px; border-radius: 5px; position: relative; }
        .header h2 { margin: 0; font-size: 18px; color: var(--gold); letter-spacing: 2px; font-weight: bold; }
        .back-btn { position: absolute; left: 8px; top: 12px; background: var(--gold); color: #000; border: none; padding: 4px 10px; border-radius: 4px; font-size: 10px; font-weight: bold; cursor: pointer; }

        .price-box { border: 1px dashed #555; padding: 20px; text-align: center; font-size: 34px; font-weight: 900; margin-bottom: 5px; background: #0a0a0a; color: #00d2ff; }
        .timer-text { text-align:center; font-size:12px; color: var(--gold); margin-bottom: 15px; font-weight: bold; }
        
        #buy-sell-per { text-align:center; font-weight:bold; margin-bottom:10px; font-size: 16px; }
        #power-bar { text-align:center; margin-bottom:20px; display: flex; justify-content: center; gap: 5px; }
        .ball { width: 14px; height: 14px; border-radius: 50%; }

        .row { display: flex; justify-content: space-between; padding: 14px 5px; border-bottom: 1px solid #111; font-size: 14px; font-weight: bold; }
        .perc-tag { color: var(--gold); font-size: 11px; background: rgba(251, 191, 36, 0.1); padding: 2px 8px; border-radius: 10px; }
        .ice-card { background: var(--card); border: 1px solid var(--ghost); padding: 15px; border-radius: 12px; margin-top: 20px; width: 100%; box-sizing: border-box; }
        
        #sig-box { text-align: center; font-weight: bold; padding: 18px; margin-top: 30px; border-radius: 8px; font-size: 18px; letter-spacing: 1px; }
        .sig-bullish { background: #064e3b; color: #22c55e; border: 1px solid #22c55e; }
        .sig-bearish { background: #450a0a; color: #ef4444; border: 1px solid #ef4444; }

        .contact-dev { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 15px 0; display: flex; justify-content: space-around; border-top: 1px solid #222; }
        .contact-dev a { color: var(--gold); text-decoration: none; font-size: 11px; border: 1px solid var(--gold); padding: 8px 16px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body onload="checkAuth()">

    <div id="auth-screen" class="lock-box">
        <div style="color:var(--gold); font-weight:bold; margin-bottom:20px; font-size: 16px;">🔒 تفعيل SEZAR-PHANTOM PRO</div>
        <div class="secure-note">هذا الرمز يعمل على جهاز واحد فقط<br>ولا يعمل على جهاز غيره نهائياً</div>
        <input type="password" id="pass-key" class="pass" placeholder="•••••">
        <button onclick="activate()" class="login-btn">تسجيل دخول</button>
        <div style="display:flex; justify-content:space-around; margin-top:15px; border-top:1px solid #222; padding-top:10px;">
            <a href="https://t.me/se44se" style="color:var(--gold); font-size:11px; text-decoration:none;">✈️ تليجرام</a>
            <a href="mailto:sezarphantom@gmail.com" style="color:var(--gold); font-size:11px; text-decoration:none;">📧 الإيميل</a>
        </div>
    </div>

    <div id="search-screen">
        <div class="sezar-brand"><span class="sub-text">「 SEZAR-PHANTOM 」</span></div>
        <input type="text" class="search-input" id="search-input" placeholder="🔍 ابحث عن اسم العملة..." oninput="searchCoins()">
        <div id="results-list"></div>
    </div>

    <div id="radar-ui">
        <div class="header">
            <button class="back-btn" onclick="goBack()">🔙 رجوع</button>
            <h2>「 SEZAR-PHANTOM 」</h2>
            <p id="current-coin-name" style="font-size:12px; margin-top:5px; color:#fff;">[ BTCUSDT ]</p>
        </div>
        <div class="price-box" id="coin-price">Loading...</div>
        <div class="timer-text">تحديث السيولة خلال: <span id="timer">30</span> ثانية</div>
        <div id="buy-sell-per">BUY: --% | SELL: --%</div>
        <div id="power-bar"></div>
        <div id="s-walls"></div>
        <div id="b-walls" style="margin-top:20px;"></div>
        <div class="ice-card"><div style="font-size:11px; color:var(--ghost); display:flex; justify-content:space-between; font-weight:bold;"><span>ICEBERG DETECTOR (+50K)</span><span style="background:#064e3b; color:#22c55e; padding:2px 5px; border-radius:3px;">ACTIVE</span></div><div id="iceberg-list"></div></div>
        <div id="sig-box">ANALYZING...</div>
        <div class="contact-dev"><a href="https://t.me/se44se" target="_blank">✈️ تليجرام</a><a href="mailto:sezarphantom@gmail.com">📧 الإيميل</a></div>
    </div>

    <script>
        const KEYS = ["SZ_01", "SZ_010", "SZ_040", "SZ_050", "SZ_08"];
        let currentSymbol = 'BTCUSDT', allCoins = [], timeLeft = 30, lastBids = [], lastAsks = [], pInt, lInt, iInt, tInt;

        function checkAuth() { if (localStorage.getItem('sz_pro_final_v1') === 'true') { showSearch(); } }
        function activate() { if (KEYS.includes(document.getElementById('pass-key').value)) { localStorage.setItem('sz_pro_final_v1', 'true'); showSearch(); } else { alert("الكود خطأ!"); } }
        
        async function showSearch() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('search-screen').style.display = 'block';
            document.getElementById('radar-ui').style.display = 'none';
            stopIntervals();
            if (allCoins.length === 0) {
                const res = await fetch('https://api.binance.com/api/v3/exchangeInfo');
                const data = await res.json();
                allCoins = data.symbols.filter(s => s.status === 'TRADING' && s.symbol.endsWith('USDT'));
            }
            searchCoins();
        }

        function searchCoins() {
            const query = document.getElementById('search-input').value.toUpperCase();
            const list = document.getElementById('results-list');
            list.innerHTML = '';
            allCoins.filter(c => c.symbol.includes(query)).slice(0, 10).forEach(c => {
                const item = document.createElement('div');
                item.className = 'coin-item';
                item.innerHTML = `<div style="font-weight:bold; font-size:16px;">${c.symbol}</div><div style="color:var(--gold); font-size:13px; font-weight:bold;">تحليل 🔭</div>`;
                item.onclick = () => startRadar(c.symbol);
                list.appendChild(item);
            });
        }

        function startRadar(symbol) {
            currentSymbol = symbol;
            document.getElementById('search-screen').style.display = 'none';
            document.getElementById('radar-ui').style.display = 'block';
            updatePrice(); updateLiquidity();
            pInt = setInterval(updatePrice, 1000); lInt = setInterval(updateLiquidity, 30000);
            iInt = setInterval(updateIceberg, 1000);
            tInt = setInterval(() => { timeLeft--; if(timeLeft<0) timeLeft=30; document.getElementById('timer').innerText = timeLeft; }, 1000);
        }

        function goBack() { showSearch(); }
        function stopIntervals() { clearInterval(pInt); clearInterval(lInt); clearInterval(iInt); clearInterval(tInt); timeLeft = 30; }

        async function updatePrice() {
            try {
                const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${currentSymbol}`);
                const data = await res.json();
                let p = parseFloat(data.price);
                document.getElementById('coin-price').innerText = '$' + p.toLocaleString(undefined, {minimumFractionDigits: p < 1 ? 5 : 2});
            } catch (e) {}
        }

        async function updateLiquidity() {
            timeLeft = 30;
            try {
                // سحب بيانات عمق السوق (Order Book)
                const res = await fetch(`https://api.binance.com/api/v3/depth?symbol=${currentSymbol}&limit=1000`);
                const data = await res.json();
                
                let bids = data.bids.map(b => ({p: parseFloat(b[0]), v: parseFloat(b[1]), liq: parseFloat(b[0]) * parseFloat(b[1])}));
                let asks = data.asks.map(a => ({p: parseFloat(a[0]), v: parseFloat(a[1]), liq: parseFloat(a[0]) * parseFloat(a[1])}));
                
                let tB = bids.reduce((s,b)=>s+b.liq,0), tS = asks.reduce((s,a)=>s+a.liq,0);
                let buyP = (tB/(tB+tS)*100), sellP = 100 - buyP;

                document.getElementById('buy-sell-per').innerText = `BUY: ${buyP.toFixed(1)}% | SELL: ${sellP.toFixed(1)}%`;
                let buyBalls = Math.round(buyP / 10), sellBalls = 10 - buyBalls;
                document.getElementById('power-bar').innerHTML = '<div class="ball" style="background:var(--green)"></div>'.repeat(buyBalls) + '<div class="ball" style="background:var(--red)"></div>'.repeat(sellBalls);
                
                const sig = document.getElementById('sig-box');
                sig.innerText = buyP > 50 ? "🟢 SIGNAL: BULLISH" : "🔴 SIGNAL: BEARISH";
                sig.className = buyP > 50 ? "sig-bullish" : "sig-bearish";

                // تصفية الجدران الثقيلة (Whale Walls) - تظهر فقط الكميات الضخمة مثل الرادار الثابت
                let whaleAsks = [...asks].sort((a,b) => b.v - a.v).slice(0, 3).sort((a,b) => a.p - b.p);
                document.getElementById('s-walls').innerHTML = `<div style="color:var(--red); font-weight:bold; border-bottom: 2px solid #333; padding-bottom:5px; margin-bottom:5px;">🔴 SELL WALLS (30s):</div>` + 
                whaleAsks.map(a => `<div class="row"><span>$${a.p.toLocaleString()}</span><span class="perc-tag">${((a.liq/tS)*100).toFixed(2)}%</span><span>Vol: ${a.v >= 1 ? a.v.toFixed(2) : a.v.toFixed(4)}M</span></div>`).join('');
                
                let whaleBids = [...bids].sort((a,b) => b.v - a.v).slice(0, 3).sort((a,b) => a.p - b.p);
                document.getElementById('b-walls').innerHTML = `<div style="color:var(--green); font-weight:bold; border-bottom: 2px solid #333; padding-bottom:5px; margin-bottom:5px;">🟢 BUY WALLS (30s):</div>` + 
                whaleBids.map(b => `<div class="row"><span>$${b.p.toLocaleString()}</span><span class="perc-tag">${((b.liq/tB)*100).toFixed(2)}%</span><span>Vol: ${b.v >= 1 ? b.v.toFixed(2) : b.v.toFixed(4)}M</span></div>`).join('');
            } catch (e) {}
        }

        async function updateIceberg() {
            try {
                const res = await fetch(`https://api.binance.com/api/v3/depth?symbol=${currentSymbol}&limit=5`);
                const data = await res.json();
                let bids = data.bids, asks = data.asks;
                let found = [];
                if (lastBids.length > 0 && bids[0][0] === lastBids[0][0]) {
                    let d = parseFloat(bids[0][1]) - parseFloat(lastBids[0][1]);
                    let amt = d * bids[0][0]; if (amt > 50000) found.push({p: bids[0][0], m: amt, t: 'Buyer'});
                }
                if (lastAsks.length > 0 && asks[0][0] === lastAsks[0][0]) {
                    let d = parseFloat(asks[0][1]) - parseFloat(lastAsks[0][1]);
                    let amt = d * asks[0][0]; if (amt > 50000) found.push({p: asks[0][0], m: amt, t: 'Seller'});
                }
                if(found.length > 0) {
                    const list = document.getElementById('iceberg-list');
                    found.forEach(ice => {
                        const row = document.createElement('div'); row.className = 'row';
                        const mVal = ice.m >= 1000000 ? (ice.m/1000000).toFixed(2) + "M" : (ice.m/1000).toFixed(1) + "K";
                        row.innerHTML = `<span style="color:${ice.t==='Buyer'?'var(--green)':'var(--red)'}">${ice.t.toUpperCase()}</span><span style="color:var(--gold)">$${mVal}</span><span>$${parseFloat(ice.p).toLocaleString()}</span>`;
                        list.prepend(row); if (list.children.length > 5) list.removeChild(list.lastChild);
                    });
                }
                lastBids = bids; lastAsks = asks;
            } catch (e) {}
        }
    </script>
</body>
</html>
