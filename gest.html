<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رادار سيزار PRO V3.4 - المطور سيزار</title>
    <style>
        :root { --gold: #fbbf24; --ghost: #a855f7; --bg: #000; --card: #0a0a0a; --red: #ef4444; --green: #22c55e; }
        body { background: var(--bg); color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        .lock-box { border: 2px solid var(--gold); padding: 30px; text-align: center; background: #050505; margin-top: 15vh; border-radius: 15px; width: 280px; }
        input { background: #111; border: 1px solid #444; color: var(--gold); padding: 12px; text-align: center; margin-bottom: 20px; width: 90%; outline: none; border-radius: 5px; }
        button { background: var(--gold); color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 5px; width: 100%; }
        #radar-ui { display: none; width: 100%; max-width: 450px; padding-bottom: 80px; }
        .header { border: 2px double var(--gold); padding: 15px; text-align: center; margin-bottom: 20px; }
        .price-box { border: 1px dashed #555; padding: 15px; text-align: center; font-size: 28px; font-weight: bold; margin-bottom: 5px; background: #080808; color: #00d2ff; }
        .ice-card { background: #000; border: 1px solid var(--ghost); padding: 15px; border-radius: 12px; margin-top: 20px; min-height: 120px; width: 100%; box-sizing: border-box;}
        .ice-title { font-size: 11px; color: var(--ghost); margin-bottom: 10px; display: flex; justify-content: space-between; font-weight: bold; }
        .ice-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #111; font-size: 12px; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .row { display: flex; justify-content: space-between; padding: 12px 5px; border-bottom: 1px solid #111; font-size: 13px; }
        .perc-tag { color: var(--gold); font-size: 10px; background: rgba(251, 191, 36, 0.1); padding: 2px 8px; border-radius: 10px; border: 0.5px solid rgba(251, 191, 36, 0.3); }
        #sig-box { text-align: center; font-weight: bold; padding: 15px; margin-top: 30px; border-radius: 5px; font-size: 16px; width: 100%; box-sizing: border-box; }
        .sig-bullish { background: #064e3b; color: #22c55e; border: 1px solid #22c55e; }
        .sig-bearish { background: #450a0a; color: #ef4444; border: 1px solid #ef4444; }
        .contact-dev { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.8); padding: 15px 0; display: flex; justify-content: space-around; border-top: 1px solid #222; }
        .contact-dev a { color: var(--gold); text-decoration: none; font-size: 11px; border: 1px solid var(--gold); padding: 8px 16px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-screen" class="lock-box">
        <div style="color:var(--gold); font-weight:bold; margin-bottom:10px;">🔒 تفعيل رادار سيزار PRO</div>
        <input type="password" id="pass-key" placeholder="أدخل كود التفعيل">
        <button onclick="activate()">دخول</button>
    </div>

    <div id="radar-ui">
        <div class="header"><h2>🔭 رادار سيزار</h2><p>[ BTCUSDT ]</p></div>
        <div class="price-box" id="coin-price">Loading...</div>
        <div style="text-align:center; font-size:10px; color:#444; margin-bottom:15px;">تحديث السيولة خلال: <span id="timer">30</span> ثانية</div>
        <div id="buy-sell-per" style="text-align:center; font-weight:bold; margin-bottom:5px;">BUY: --% | SELL: --%</div>
        <div id="power-bar" style="text-align:center; margin-bottom:20px; letter-spacing:3px;"></div>
        
        <div id="s-walls"></div>
        <div id="b-walls" style="margin-top:20px;"></div>

        <div class="ice-card">
            <div class="ice-title"><span>ICEBERG DETECTOR</span><span id="ice-status" style="background:#064e3b; color:#22c55e; padding:2px 5px; border-radius:3px;">SCANNING</span></div>
            <div id="iceberg-list"><div style="text-align:center; padding:20px; color:#333; font-size:10px;">جاري مراقبة الحيتان...</div></div>
        </div>

        <div id="sig-box">ANALYZING...</div>
        
        <div class="contact-dev">
            <a href="https://t.me/se44se">✈️ تليجرام</a>
            <a href="mailto:sezarphantom@gmail.com">📧 الإيميل</a>
        </div>
    </div>

    <script>
        const KEYS = ["SZ_01", "SZ_010", "SZ_040", "SZ_050", "SZ_08"];
        const SYMBOL = 'BTCUSDT';
        let lastBids = [], lastAsks = [], timeLeft = 30;

        function activate() {
            if (KEYS.includes(document.getElementById('pass-key').value)) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('radar-ui').style.display = 'block';
                setInterval(updatePrice, 1000);
                setInterval(updateLiquidity, 2000); // تحديث سريع لرصد الأيسبرغ
                setInterval(() => { timeLeft--; if(timeLeft<0) timeLeft=30; document.getElementById('timer').innerText = timeLeft; }, 1000);
            } else { alert("الكود خطأ!"); }
        }

        async function updatePrice() {
            try {
                const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${SYMBOL}`);
                const data = await res.json();
                document.getElementById('coin-price').innerText = '$' + parseFloat(data.price).toLocaleString(undefined, {minimumFractionDigits: 2});
            } catch (e) {}
        }

        async function updateLiquidity() {
            try {
                const res = await fetch(`https://api.binance.com/api/v3/depth?symbol=${SYMBOL}&limit=100`);
                const data = await res.json();
                
                // رصد الأيسبرغ فوراً (حساسية عالية جداً)
                analyzeIceberg(data.bids, data.asks);

                // تحديث الجدران والسيولة (كل 30 ثانية حقيقية من خلال المنطق)
                if (timeLeft === 30 || document.getElementById('b-walls').innerHTML === "") {
                    renderWalls(data.bids, data.asks);
                }
            } catch (e) {}
        }

        function analyzeIceberg(bids, asks) {
            let found = [];
            // حساسية رصد الحيتان المخفية للبتكوين
            if (lastBids.length > 0 && parseFloat(bids[0][0]) === parseFloat(lastBids[0][0])) {
                let diff = parseFloat(bids[0][1]) - parseFloat(lastBids[0][1]);
                if (diff > 0.01) found.push({p: bids[0][0], m: diff * bids[0][0], t: 'Buyer'});
            }
            if (lastAsks.length > 0 && parseFloat(asks[0][0]) === parseFloat(lastAsks[0][0])) {
                let diff = parseFloat(asks[0][1]) - parseFloat(lastAsks[0][1]);
                if (diff > 0.01) found.push({p: asks[0][0], m: diff * asks[0][0], t: 'Seller'});
            }

            if (found.length > 0) {
                const list = document.getElementById('iceberg-list');
                if(list.innerText.includes("جاري")) list.innerHTML = '';
                found.forEach(ice => {
                    const row = document.createElement('div');
                    row.className = 'ice-row';
                    const mFormatted = ice.m >= 1000000 ? (ice.m/1000000).toFixed(2) + "M" : (ice.m/1000).toFixed(1) + "K";
                    row.innerHTML = `<span style="color:${ice.t==='Buyer'?'var(--green)':'var(--red)'}; font-weight:bold;">${ice.t.toUpperCase()}</span><span style="color:var(--gold)">$${mFormatted}</span><span style="color:#00e6ff">${parseFloat(ice.p).toLocaleString()}</span>`;
                    list.prepend(row);
                    if (list.children.length > 5) list.removeChild(list.lastChild);
                });
            }
            lastBids = bids; lastAsks = asks;
        }

        function renderWalls(bids, asks) {
            let bidsLiq = bids.map(b => ({p: parseFloat(b[0]), liq: parseFloat(b[0]) * parseFloat(b[1])}));
            let asksLiq = asks.map(a => ({p: parseFloat(a[0]), liq: parseFloat(a[0]) * parseFloat(a[1])}));
            let tB = bidsLiq.reduce((s,b)=>s+b.liq,0), tS = asksLiq.reduce((s,a)=>s+a.liq,0);
            let buyP = (tB/(tB+tS)*100);

            const sig = document.getElementById('sig-box');
            sig.innerText = buyP > 50 ? "🟢 SIGNAL: BULLISH" : "🔴 SIGNAL: BEARISH";
            sig.className = buyP > 50 ? "sig-bullish" : "sig-bearish";

            document.getElementById('buy-sell-per').innerText = `BUY: ${buyP.toFixed(1)}% | SELL: ${(100-buyP).toFixed(1)}%`;
            document.getElementById('power-bar').innerText = "🟢".repeat(Math.round(buyP/6.6)) + "🔴".repeat(15-Math.round(buyP/6.6));

            let whaleAsks = [...asksLiq].sort((a,b) => b.liq - a.liq).slice(0, 3).sort((a,b) => a.p - b.p);
            document.getElementById('s-walls').innerHTML = `<div style="color:var(--red); font-weight:bold; border-bottom:1px solid #333; padding-bottom:5px;">🔴 SELL WALLS (30s):</div>` + 
            whaleAsks.map(a => `<div class="row"><span>Vol: ${(a.liq/1000000).toFixed(2)}M</span><span class="perc-tag">${((a.liq/tS)*100).toFixed(1)}%</span><span>$${a.p.toLocaleString()}</span></div>`).join('');

            let whaleBids = [...bidsLiq].sort((a,b) => b.liq - a.liq).slice(0, 3).sort((a,b) => a.p - b.p);
            document.getElementById('b-walls').innerHTML = `<div style="color:var(--green); font-weight:bold; border-bottom:1px solid #333; padding-bottom:5px;">🟢 BUY WALLS (30s):</div>` + 
            whaleBids.map(b => `<div class="row"><span>Vol: ${(b.liq/1000000).toFixed(2)}M</span><span class="perc-tag">${((b.liq/tB)*100).toFixed(1)}%</span><span>$${b.p.toLocaleString()}</span></div>`).join('');
        }
    </script>
</body>
</html>
