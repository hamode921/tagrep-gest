<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEZAR-PHANTOM PRO ULTIMATE</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --gold: #fbbf24; --ghost: #a855f7; --bg: #000; --card: #080808; --red: #ef4444; --green: #22c55e; }
        body { background: var(--bg); color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        .lock-box { border: 2px solid var(--gold); padding: 30px; text-align: center; background: #000; margin-top: 15vh; border-radius: 15px; width: 300px; display: block; }
        input.pass { background: #111; border: 1px solid #333; color: var(--gold); padding: 12px; text-align: center; margin-bottom: 20px; width: 95%; outline: none; border-radius: 5px; font-size: 18px; }
        button.login-btn { background: var(--gold); color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 8px; width: 100%; font-size: 18px; }
        #search-screen, #radar-ui { display: none; width: 100%; max-width: 450px; text-align: center; }
        .price-box { border: 1px dashed #555; padding: 15px; text-align: center; font-size: 32px; font-weight: 900; background: #0a0a0a; color: #00d2ff; }
        .row { display: flex; justify-content: space-between; padding: 12px 5px; border-bottom: 1px solid #111; font-size: 13px; font-weight: bold; }
        .perc-tag { color: var(--gold); font-size: 10px; background: rgba(251, 191, 36, 0.1); padding: 2px 8px; border-radius: 10px; }
        .contact-dev { position: fixed; bottom: 0; width: 100%; background: #000; padding: 15px 0; display: flex; justify-content: space-around; border-top: 1px solid #222; }
        .contact-dev a { color: var(--gold); text-decoration: none; border: 1px solid var(--gold); padding: 8px 16px; border-radius: 5px; font-size: 11px; }
    </style>
</head>
<body onload="checkAuth()">
    <div id="auth-screen" class="lock-box">
        <div style="color:var(--gold); font-weight:bold; margin-bottom:20px;">🔒 نظام سيزو فانتوم PRO</div>
        <input type="password" id="pass-key" class="pass" placeholder="•••••">
        <button onclick="activate()" class="login-btn">تسجيل دخول</button>
    </div>

    <div id="search-screen">
        <div style="margin-bottom:30px;"><span style="font-size:28px; font-weight:bold; color:var(--gold);">「 SEZAR-PHANTOM 」</span></div>
        <input type="text" class="search-input" style="background:#1a1a1a; border:1px solid #333; color:#fff; padding:18px; width:95%; border-radius:15px;" id="search-input" placeholder="🔍 ابحث (Spot & Futures)..." oninput="searchCoins()">
        <div id="results-list"></div>
    </div>

    <div id="radar-ui">
        <div style="border:1px solid var(--gold); padding:5px; border-radius:5px; position:relative;">
            <button onclick="goBack()" style="position:absolute; left:8px; top:8px; background:var(--gold); border:none; padding:4px 10px; border-radius:4px; font-size:10px; font-weight:bold; cursor:pointer;">🔙 رجوع</button>
            <h2 id="radar-title">「 SEZAR-PHANTOM 」</h2>
            <p id="current-coin-name" style="font-size:11px; margin:0;">[ BTCUSDT ]</p>
        </div>
        <div class="price-box" id="coin-price">Loading...</div>
        <div style="text-align:center; font-size:10px; color:var(--gold); margin-bottom:12px;">تحديث السيولة خلال: <span id="timer">30</span> ثانية</div>
        <div id="buy-sell-per" style="text-align:center; font-weight:bold; margin-bottom:10px;">BUY: --% | SELL: --%</div>
        <div id="power-bar" style="display:flex; justify-content:center; gap:4px; margin-bottom:20px;"></div>
        
        <div id="s-walls"></div>
        <div id="b-walls" style="margin-top:20px;"></div>
        
        <div style="background: var(--card); border: 1px solid var(--ghost); padding: 15px; border-radius: 12px; margin-top: 20px; width: 100%;">
            <div style="font-size:11px; color:var(--ghost); display:flex; justify-content:space-between; font-weight:bold;"><span>ICEBERG DETECTOR (+50K)</span><span style="background:#064e3b; color:#22c55e; padding:2px 5px; border-radius:3px;">مفعل : 🔊 نطق</span></div>
            <div id="iceberg-list"></div>
        </div>
        
        <div class="contact-dev"><a href="https://t.me/se44se">✈️ تليجرام</a><a href="mailto:sezarphantom@gmail.com">📧 الإيميل</a></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAzEZksgZMPbY79K_TM3mHKeW1shQ6V-lY",
            authDomain: "sezar-phantom-auth.firebaseapp.com",
            projectId: "sezar-phantom-auth",
            storageBucket: "sezar-phantom-auth.firebasestorage.app",
            messagingSenderId: "112991314655",
            appId: "1:112991314655:web:cbca0b5c0c6b6e4f51ff6a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentSymbol = 'BTCUSDT', currentMode = 'spot', allCoins = [], timeLeft = 30, lastBids = [], lastAsks = [], pInt, lInt, iInt, tInt;

        async function checkAuth() {
            const k = localStorage.getItem('sz_k');
            if(k) {
                const doc = await db.collection("users").doc(k).get();
                if(doc.exists) showSearch(); else localStorage.removeItem('sz_k');
            }
        }

        async function activate() {
            const k = document.getElementById('pass-key').value;
            const doc = await db.collection("users").doc(k).get();
            if(doc.exists) { localStorage.setItem('sz_k', k); showSearch(); } else alert("الكود غلط!");
        }

        async function showSearch() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('search-screen').style.display = 'block';
            document.getElementById('radar-ui').style.display = 'none';
            stopIntervals();
            if(allCoins.length === 0) {
                const [sR, fR] = await Promise.all([fetch('https://api.binance.com/api/v3/exchangeInfo'), fetch('https://fapi.binance.com/fapi/v1/exchangeInfo')]);
                const sD = await sR.json(), fD = await fR.json();
                allCoins = [...sD.symbols.filter(s => s.status === 'TRADING' && s.symbol.endsWith('USDT')).map(s => ({s: s.symbol, m: 'spot'})), ...fD.symbols.filter(s => s.status === 'TRADING' && s.contractType === 'PERPETUAL').map(s => ({s: s.symbol, m: 'futures'}))];
            }
            searchCoins();
        }

        function searchCoins() {
            const q = document.getElementById('search-input').value.toUpperCase();
            const list = document.getElementById('results-list'); list.innerHTML = '';
            let unique = {}; allCoins.filter(c => c.s.includes(q)).forEach(c => { if (!unique[c.s] || c.m === 'futures') unique[c.s] = c; });
            Object.values(unique).slice(0, 15).forEach(c => {
                const item = document.createElement('div');
                item.style = "background:#080808; border:1px solid #222; padding:15px; border-radius:15px; cursor:pointer; display:flex; justify-content:space-between; margin-bottom:10px;";
                item.innerHTML = `<span>${c.s}</span><span style="font-size:9px; padding:2px 5px; background:${c.m==='futures'?'#450a0a':'#064e3b'}">${c.m.toUpperCase()}</span>`;
                item.onclick = () => startRadar(c.s, c.m); list.appendChild(item);
            });
        }

        function startRadar(s, m) {
            currentSymbol = s; currentMode = m;
            document.getElementById('search-screen').style.display = 'none';
            document.getElementById('radar-ui').style.display = 'block';
            document.getElementById('current-coin-name').innerText = `[ ${s} ] - ${m.toUpperCase()}`;
            stopIntervals(); updatePrice(); updateLiquidity(); startTimer();
            pInt = setInterval(updatePrice, 1000); lInt = setInterval(updateLiquidity, 30000); iInt = setInterval(updateIceberg, 1000);
        }

        async function updatePrice() {
            const url = currentMode === 'futures' ? `https://fapi.binance.com/fapi/v1/ticker/price?symbol=${currentSymbol}` : `https://api.binance.com/api/v3/ticker/price?symbol=${currentSymbol}`;
            const r = await fetch(url); const d = await r.json();
            document.getElementById('coin-price').innerText = '$' + parseFloat(d.price).toLocaleString(undefined, {minimumFractionDigits: 2});
        }

        async function updateLiquidity() {
            timeLeft = 30;
            const url = currentMode === 'futures' ? `https://fapi.binance.com/fapi/v1/depth?symbol=${currentSymbol}&limit=1000` : `https://api.binance.com/api/v3/depth?symbol=${currentSymbol}&limit=1000`;
            const r = await fetch(url); const d = await r.json();
            let b = d.bids.map(x => ({p: parseFloat(x[0]), liq: parseFloat(x[0]) * parseFloat(x[1])}));
            let a = d.asks.map(x => ({p: parseFloat(x[0]), liq: parseFloat(x[0]) * parseFloat(x[1])}));
            let tB = b.reduce((s,x)=>s+x.liq,0), tS = a.reduce((s,x)=>s+x.liq,0);
            let buyP = (tB/(tB+tS)*100), sellP = 100 - buyP;
            document.getElementById('buy-sell-per').innerText = `BUY: ${buyP.toFixed(1)}% | SELL: ${sellP.toFixed(1)}%`;
            document.getElementById('power-bar').innerHTML = '<div style="width:12px; height:12px; border-radius:50%; background:var(--green)"></div>'.repeat(Math.round(buyP/10)) + '<div style="width:12px; height:12px; border-radius:50%; background:var(--red)"></div>'.repeat(10-Math.round(buyP/10));
            
            // جدران الفيوتشرز الأصلية
            let wA = [...a].sort((x,y) => y.liq - x.liq).slice(0, 3).sort((x,y) => x.p - y.p);
            document.getElementById('s-walls').innerHTML = `<div style="color:var(--red); font-weight:bold; border-bottom:1px solid #333;">🔴 SELL WALLS (FUTURES):</div>` + wA.map(x => `<div class="row"><span>$${x.p.toLocaleString()}</span><span class="perc-tag">${((x.liq/tS)*100).toFixed(2)}%</span><span>Vol: ${(x.liq/1000000).toFixed(2)}M</span></div>`).join('');
            let wB = [...b].sort((x,y) => y.liq - x.liq).slice(0, 3).sort((x,y) => x.p - y.p);
            document.getElementById('b-walls').innerHTML = `<div style="color:var(--green); font-weight:bold; border-bottom:1px solid #333;">🟢 BUY WALLS (FUTURES):</div>` + wB.map(x => `<div class="row"><span>$${x.p.toLocaleString()}</span><span class="perc-tag">${((x.liq/tB)*100).toFixed(2)}%</span><span>Vol: ${(x.liq/1000000).toFixed(2)}M</span></div>`).join('');
        }

        async function updateIceberg() {
            const url = currentMode === 'futures' ? `https://fapi.binance.com/fapi/v1/depth?symbol=${currentSymbol}&limit=5` : `https://api.binance.com/api/v3/depth?symbol=${currentSymbol}&limit=5`;
            const r = await fetch(url); const d = await r.json();
            let b = d.bids, a = d.asks; let f = [];
            if (lastBids.length > 0 && b[0][0] === lastBids[0][0]) { let m = (parseFloat(b[0][1]) - parseFloat(lastBids[0][1])) * b[0][0]; if (m > 50000) f.push({p: b[0][0], m: m, t: 'Buyer'}); }
            if (lastAsks.length > 0 && a[0][0] === lastAsks[0][0]) { let m = (parseFloat(a[0][1]) - parseFloat(lastAsks[0][1])) * a[0][0]; if (m > 50000) f.push({p: a[0][0], m: m, t: 'Seller'}); }
            if(f.length > 0) { const list = document.getElementById('iceberg-list'); f.forEach(x => { const row = document.createElement('div'); row.className = 'row'; row.innerHTML = `<span style="color:${x.t==='Buyer'?'var(--green)':'var(--red)'}">${x.t.toUpperCase()}</span><span style="color:var(--gold)">$${x.m>=1000000?(x.m/1000000).toFixed(2)+'M':(x.m/1000).toFixed(1)+'K'}</span><span>$${parseFloat(x.p).toLocaleString()}</span>`; list.prepend(row); if (list.children.length > 5) list.removeChild(list.lastChild); }); }
            lastBids = b; lastAsks = a;
        }

        function startTimer() { timeLeft = 30; tInt = setInterval(() => { timeLeft--; document.getElementById('timer').innerText = timeLeft; if(timeLeft<0) timeLeft=30; }, 1000); }
        function goBack() { showSearch(); }
        function stopIntervals() { clearInterval(pInt); clearInterval(lInt); clearInterval(iInt); clearInterval(tInt); }
    </script>
</body>
</html>
