<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEZAR-PHANTOM PRO ULTIMATE</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --gold: #fbbf24; --bg: #000; --red: #ef4444; }
        body { background: var(--bg); color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        .lock-box { border: 2px solid var(--gold); padding: 30px; text-align: center; background: #000; margin-top: 15vh; border-radius: 15px; width: 300px; }
        input.pass { background: #111; border: 1px solid #333; color: var(--gold); padding: 12px; text-align: center; margin-bottom: 20px; width: 95%; outline: none; border-radius: 5px; font-size: 18px; }
        button.login-btn { background: var(--gold); color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 8px; width: 100%; font-size: 18px; }
        #expiry-msg { display: none; color: var(--red); font-size: 12px; margin-bottom: 20px; border: 1px solid var(--red); padding: 12px; border-radius: 8px; font-weight: bold; }
        #search-screen, #radar-ui { display: none; width: 100%; max-width: 450px; text-align: center; }
        .price-box { border: 1px dashed #555; padding: 15px; font-size: 32px; color: #00d2ff; }
        .row { display: flex; justify-content: space-between; padding: 12px 5px; border-bottom: 1px solid #111; font-size: 13px; }
    </style>
</head>
<body onload="checkAuth()">

    <div id="auth-screen" class="lock-box">
        <div id="expiry-msg">⚠️ انتهى اشتراكك للتجديد تواصل مع المطور</div>
        <div style="color:var(--gold); font-weight:bold; margin-bottom:20px;">🔒 تفعيل SEZAR-PHANTOM PRO</div>
        <input type="password" id="pass-key" class="pass" placeholder="•••••">
        <button onclick="activate()" class="login-btn">تسجيل دخول</button>
        <div id="error-msg" style="color:red; margin-top:10px;"></div>
    </div>

    <div id="search-screen">
        <h2>「 SEZAR-PHANTOM 」</h2>
        <input type="text" id="search-input" placeholder="🔍 ابحث..." oninput="searchCoins()" style="width:90%; padding:15px; background:#111; color:#fff; border:1px solid #333; border-radius:10px;">
        <div id="results-list" style="margin-top:20px;"></div>
    </div>

    <div id="radar-ui">
        <button onclick="goBack()">🔙 رجوع</button>
        <h2 id="current-coin-name"></h2>
        <div class="price-box" id="coin-price">Loading...</div>
        <div id="s-walls"></div>
        <div id="b-walls"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAzEZksgZMPbY79K_TM3mHKeW1shQ6V-lY",
            authDomain: "sezar-phantom-auth.firebaseapp.com",
            projectId: "sezar-phantom-auth",
            storageBucket: "sezar-phantom-auth.firebasestorage.app",
            messagingSenderId: "112991314655",
            appId: "1:112991314655:web:cbca0b5c0c6b6e4f51ff6a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function checkAuth() {
            const k = localStorage.getItem('sz_ultimate_v1_key');
            const myId = localStorage.getItem('sz_device_id');
            if (k && myId) {
                const doc = await db.collection("users").doc(k).get();
                if (doc.exists) {
                    const data = doc.data();
                    if (data.expiryDate && new Date() > new Date(data.expiryDate)) {
                        document.getElementById('expiry-msg').style.display = 'block';
                        return;
                    }
                    if (data.deviceId && data.deviceId !== myId) { location.reload(); return; }
                    showSearch();
                }
            }
        }

        async function activate() {
            const k = document.getElementById('pass-key').value;
            if(!k) return;
            const doc = await db.collection("users").doc(k).get();
            if (doc.exists) {
                const data = doc.data();
                const myId = 'DEV-' + Math.random().toString(36).substr(2, 9);
                
                // تشيك التاريخ
                if (data.expiryDate && new Date() > new Date(data.expiryDate)) {
                    document.getElementById('expiry-msg').style.display = 'block';
                    return;
                }

                // قفل الجهاز الصارم
                if (data.deviceId && data.deviceId !== (localStorage.getItem('sz_device_id') || myId)) {
                    document.getElementById('error-msg').innerText = "❌ مفعل على جهاز آخر!";
                    return;
                }

                if (!data.deviceId) {
                    await db.collection("users").doc(k).update({ deviceId: myId });
                    localStorage.setItem('sz_device_id', myId);
                } else {
                    localStorage.setItem('sz_device_id', data.deviceId);
                }

                localStorage.setItem('sz_ultimate_v1_key', k);
                showSearch();
            } else {
                document.getElementById('error-msg').innerText = "❌ الكود خطأ!";
            }
        }

        function showSearch() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('search-screen').style.display = 'block';
        }

        // باقي دوال البحث والرادار مالتك (مختصرة للسرعة)
        function searchCoins() { /* كود البحث مالتك */ }
        function goBack() { location.reload(); }
    </script>
</body>
</html>
