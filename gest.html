<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEZAR-PHANTOM PRO ULTIMATE</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --gold: #fbbf24; --ghost: #a855f7; --bg: #000; --card: #080808; --red: #ef4444; --green: #22c55e; }
        body { background: var(--bg); color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        
        /* قفل الحماية */
        .lock-box { border: 2px solid var(--gold); padding: 30px; text-align: center; background: #000; margin-top: 15vh; border-radius: 15px; width: 300px; display: block; }
        input.pass { background: #111; border: 1px solid #333; color: var(--gold); padding: 12px; text-align: center; margin-bottom: 20px; width: 95%; outline: none; border-radius: 5px; font-size: 18px; }
        button.login-btn { background: var(--gold); color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 8px; width: 100%; font-size: 18px; }

        /* الرادار الأصلي مالتك */
        #search-screen, #radar-ui { display: none; width: 100%; max-width: 450px; text-align: center; }
        .sezar-brand .sub-text { font-size: 28px; font-weight: bold; color: var(--gold); text-shadow: 0 0 15px rgba(251, 191, 36, 0.5); }
        .search-input { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 18px; width: 95%; border-radius: 15px; font-size: 16px; outline: none; text-align: center; margin-bottom: 30px; }
        .coin-item { background: #080808; border: 1px solid #222; padding: 15px; border-radius: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .price-box { border: 1px dashed #555; padding: 15px; text-align: center; font-size: 32px; font-weight: 900; background: #0a0a0a; color: #00d2ff; }
        .row { display: flex; justify-content: space-between; padding: 12px 5px; border-bottom: 1px solid #111; font-size: 13px; font-weight: bold; }
        .contact-dev { position: fixed; bottom: 0; width: 100%; background: #000; padding: 15px 0; display: flex; justify-content: space-around; border-top: 1px solid #222; }
        .contact-dev a { color: var(--gold); text-decoration: none; border: 1px solid var(--gold); padding: 8px 16px; border-radius: 5px; font-size: 11px; }
    </style>
</head>
<body>

    <div id="auth-screen" class="lock-box">
        <div style="color:var(--gold); font-weight:bold; margin-bottom:20px;">🔒 نظام حماية SEZAR PRO</div>
        <input type="password" id="pass-key" class="pass" placeholder="أدخل كود التفعيل">
        <button onclick="activate()" class="login-btn">فتح الرادار</button>
    </div>

    <div id="search-screen">
        <div class="sezar-brand"><span class="sub-text">「 SEZAR-PHANTOM 」</span></div>
        <input type="text" class="search-input" id="search-input" placeholder="🔍 ابحث عن عملة..." oninput="searchCoins()">
        <div id="results-list"></div>
    </div>

    <div id="radar-ui">
        <div style="border:1px solid var(--gold); padding:5px; border-radius:5px; position:relative;">
            <button onclick="goBack()" style="position:absolute; left:8px; top:8px; background:var(--gold); border:none; padding:4px 10px; border-radius:4px; font-size:10px; font-weight:bold; cursor:pointer;">🔙 رجوع</button>
            <h2>「 SEZAR-PHANTOM 」</h2>
            <p id="current-coin-name" style="font-size:11px; margin:0;">[ BTCUSDT ]</p>
        </div>
        <div class="price-box" id="coin-price">Loading...</div>
        <div id="buy-sell-per" style="text-align:center; font-weight:bold; margin-top:10px;">BUY: --% | SELL: --%</div>
        <div id="s-walls"></div>
        <div id="b-walls" style="margin-top:20px;"></div>
        <div class="contact-dev"><a href="https://t.me/se44se">✈️ تليجرام</a><a href="mailto:sezarphantom@gmail.com">📧 الإيميل</a></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAzEZksgZMPbY79K_TM3mHKeW1shQ6V-lY",
            authDomain: "sezar-phantom-auth.firebaseapp.com",
            projectId: "sezar-phantom-auth",
            storageBucket: "sezar-phantom-auth.firebasestorage.app",
            messagingSenderId: "112991314655",
            appId: "1:112991314655:web:cbca0b5c0c6b6e4f51ff6a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let allCoins = [], pInt, lInt;

        // التحقق من الكود المحفوظ فقط عند تشغيل التطبيق
        window.onload = async () => {
            const k = localStorage.getItem('sz_key');
            if (k) {
                const doc = await db.collection("users").doc(k).get();
                if (doc.exists) showSearch();
            }
        };

        async function activate() {
            const k = document.getElementById('pass-key').value;
            const doc = await db.collection("users").doc(k).get();
            if (doc.exists) {
                localStorage.setItem('sz_key', k);
                showSearch();
            } else alert("الكود غلط!");
        }

        async function showSearch() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('search-screen').style.display = 'block';
            document.getElementById('radar-ui').style.display = 'none';
            if (allCoins.length === 0) {
                const r = await fetch('https://fapi.binance.com/fapi/v1/exchangeInfo');
                const d = await r.json();
                allCoins = d.symbols.filter(s => s.symbol.endsWith('USDT')).map(s => s.symbol);
            }
            searchCoins();
        }

        function searchCoins() {
            const q = document.getElementById('search-input').value.toUpperCase();
            const list = document.getElementById('results-list'); list.innerHTML = '';
            allCoins.filter(c => c.includes(q)).slice(0, 15).forEach(c => {
                const div = document.createElement('div');
                div.className = 'coin-item';
                div.innerHTML = `<span>${c}</span><span style="background:#450a0a; padding:2px 5px; border-radius:3px; font-size:9px;">FUTURES</span>`;
                div.onclick = () => startRadar(c);
                list.appendChild(div);
            });
        }

        function startRadar(s) {
            document.getElementById('search-screen').style.display = 'none';
            document.getElementById('radar-ui').style.display = 'block';
            document.getElementById('current-coin-name').innerText = s;
            clearInterval(pInt); clearInterval(lInt);
            updatePrice(s); updateLiq(s);
            pInt = setInterval(() => updatePrice(s), 1000);
            lInt = setInterval(() => updateLiq(s), 30000);
        }

        async function updatePrice(s) {
            const r = await fetch(`https://fapi.binance.com/fapi/v1/ticker/price?symbol=${s}`);
            const d = await r.json();
            document.getElementById('coin-price').innerText = '$' + parseFloat(d.price).toLocaleString();
        }

        async function updateLiq(s) {
            const r = await fetch(`https://fapi.binance.com/fapi/v1/depth?symbol=${s}&limit=1000`);
            const d = await r.json();
            let b = d.bids.map(x => ({p: parseFloat(x[0]), v: parseFloat(x[0])*parseFloat(x[1])}));
            let a = d.asks.map(x => ({p: parseFloat(x[0]), v: parseFloat(x[0])*parseFloat(x[1])}));
            let tB = b.reduce((s,x)=>s+x.v,0), tS = a.reduce((s,x)=>s+x.v,0);
            document.getElementById('buy-sell-per').innerText = `BUY: ${(tB/(tB+tS)*100).toFixed(1)}% | SELL: ${(tS/(tB+tS)*100).toFixed(1)}%`;
            
            let wA = a.sort((x,y)=>y.v-x.v).slice(0,3).sort((x,y)=>x.p-y.p);
            document.getElementById('s-walls').innerHTML = `<div class="red" style="font-weight:bold;">🔴 SELL WALLS (FUTURES)</div>` + wA.map(x => `<div class="row"><span>$${x.p.toLocaleString()}</span><span>Vol: ${(x.v/1000000).toFixed(2)}M</span></div>`).join('');
            let wB = b.sort((x,y)=>y.v-x.v).slice(0,3).sort((x,y)=>x.p-y.p);
            document.getElementById('b-walls').innerHTML = `<div class="green" style="font-weight:bold;">🟢 BUY WALLS (FUTURES)</div>` + wB.map(x => `<div class="row"><span>$${x.p.toLocaleString()}</span><span>Vol: ${(x.v/1000000).toFixed(2)}M</span></div>`).join('');
        }

        function goBack() { showSearch(); }
    </script>
</body>
</html>
