<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SEZAR-PHANTOM PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --gold: #fbbf24; --bg: #000; --red: #ef4444; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 10px; overflow-x: hidden; }
        .lock-box { border: 2px solid var(--gold); padding: 30px; text-align: center; background: #000; margin-top: 15vh; border-radius: 15px; width: 280px; }
        input.pass { background: #111; border: 1px solid #333; color: var(--gold); padding: 12px; text-align: center; margin-bottom: 20px; width: 90%; border-radius: 8px; font-size: 18px; outline: none; }
        button.login-btn { background: var(--gold); color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 10px; width: 100%; font-size: 18px; }
        #search-screen, #radar-ui { display: none; width: 100%; max-width: 450px; text-align: center; }
        .search-input { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 15px; width: 90%; border-radius: 12px; font-size: 16px; outline: none; margin-bottom: 20px; }
        .coin-item { background: #080808; border: 1px solid #222; padding: 12px; border-radius: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .price-box { border: 1px dashed #444; padding: 10px; font-size: 32px; font-weight: bold; background: #050505; color: #00d2ff; margin-bottom: 10px; border-radius: 8px; }
        /* شارت iframe مباشر - أضمن طريقة للموبايل */
        #chart-frame { width: 100%; height: 350px; border: 1px solid #222; border-radius: 10px; background: #000; }
        .row { display: flex; justify-content: space-between; padding: 8px 5px; border-bottom: 1px solid #111; font-size: 12px; }
        .contact-dev { position: fixed; bottom: 0; width: 100%; background: #000; padding: 15px 0; display: flex; justify-content: space-around; border-top: 1px solid #222; }
        .contact-dev a { color: var(--gold); text-decoration: none; border: 1px solid var(--gold); padding: 8px 15px; border-radius: 6px; font-size: 12px; }
    </style>
</head>
<body onload="checkSaved()">

    <div id="auth-screen" class="lock-box">
        <div style="color:var(--gold); font-weight:bold; margin-bottom:20px;">🔒 SEZAR-PHANTOM PRO</div>
        <input type="password" id="pass-key" class="pass" placeholder="كود التفعيل">
        <button onclick="activate()" class="login-btn">دخول</button>
    </div>

    <div id="search-screen">
        <h2 style="color:var(--gold);">「 SEZAR-PHANTOM 」</h2>
        <input type="text" class="search-input" id="search-input" placeholder="🔍 ابحث..." oninput="searchCoins()">
        <div id="results-list"></div>
    </div>

    <div id="radar-ui">
        <div style="border:1px solid var(--gold); padding:10px; border-radius:10px; position:relative; margin-bottom:10px;">
            <button onclick="goBack()" style="position:absolute; left:10px; top:12px; background:var(--gold); border:none; padding:5px 10px; border-radius:5px; font-size:12px; font-weight:bold;">🔙</button>
            <h3 id="current-coin-name" style="margin:0; color:var(--gold);">---</h3>
        </div>
        <div class="price-box" id="coin-price">Loading...</div>
        
        <div id="chart-container">
            <iframe id="chart-frame" src=""></iframe>
        </div>

        <div id="buy-sell-per" style="padding:10px; font-weight:bold; font-size:13px; color:#aaa;">BUY: --% | SELL: --%</div>
        <div id="s-walls"></div>
        <div id="b-walls" style="margin-top:10px; margin-bottom:80px;"></div>
        <div class="contact-dev"><a href="https://t.me/se44se">✈️ المطور</a></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAzEZksgZMPbY79K_TM3mHKeW1shQ6V-lY",
            authDomain: "sezar-phantom-auth.firebaseapp.com",
            projectId: "sezar-phantom-auth",
            storageBucket: "sezar-phantom-auth.firebasestorage.app",
            messagingSenderId: "112991314655",
            appId: "1:112991314655:web:cbca0b5c0c6b6e4f51ff6a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function checkSaved() {
            const k = localStorage.getItem('sz_key_final_v2');
            if (k) {
                const doc = await db.collection("users").doc(k).get();
                if (doc.exists) showSearch();
            }
        }

        async function activate() { 
            const k = document.getElementById('pass-key').value;
            if(!k) return;
            const doc = await db.collection("users").doc(k).get();
            if (doc.exists) { 
                localStorage.setItem('sz_key_final_v2', k); 
                showSearch(); 
            }
        }

        async function showSearch() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('search-screen').style.display = 'block';
            document.getElementById('radar-ui').style.display = 'none';
            
            const r = await fetch('https://api.binance.com/api/v3/ticker/price');
            const d = await r.json();
            window.allCoins = d.map(s => s.symbol).filter(s => s.endsWith('USDT'));
        }

        function searchCoins() {
            const q = document.getElementById('search-input').value.toUpperCase();
            const list = document.getElementById('results-list'); list.innerHTML = '';
            window.allCoins.filter(c => c.includes(q)).slice(0, 8).forEach(c => {
                const item = document.createElement('div');
                item.className = 'coin-item';
                item.innerHTML = `<span>${c}</span><span style="color:var(--gold)">🔭</span>`;
                item.onclick = () => startRadar(c); list.appendChild(item);
            });
        }

        function startRadar(s) {
            document.getElementById('search-screen').style.display = 'none';
            document.getElementById('radar-ui').style.display = 'block';
            document.getElementById('current-coin-name').innerText = s;
            
            // تحميل الشارت بـ iframe - هاي الطريقة مستحيل تطلع بياض
            document.getElementById('chart-frame').src = `https://s.tradingview.com/widgetembed/?symbol=BINANCE:${s}&interval=1&theme=dark`;

            updateData(s);
            window.pInt = setInterval(() => updateData(s), 3000);
        }

        async function updateData(s) {
            try {
                // سحب السعر والسيولة بطلب واحد لتقليل الثقل
                const [pRes, dRes] = await Promise.all([
                    fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${s}`),
                    fetch(`https://api.binance.com/api/v3/depth?symbol=${s}&limit=100`)
                ]);
                const pData = await pRes.json();
                const dData = await dRes.json();

                document.getElementById('coin-price').innerText = '$' + parseFloat(pData.price).toLocaleString();

                let b = dData.bids.map(x => ({p: x[0], v: x[0]*x[1]})), a = dData.asks.map(x => ({p: x[0], v: x[0]*x[1]}));
                let tB = b.reduce((s,x)=>s+x.v,0), tS = a.reduce((s,x)=>s+x.v,0);
                document.getElementById('buy-sell-per').innerText = `BUY: ${(tB/(tB+tS)*100).toFixed(1)}% | SELL: ${(tS/(tB+tS)*100).toFixed(1)}%`;
                
                const render = (target, list) => {
                    document.getElementById(target).innerHTML = list.sort((x,y)=>y.v-x.v).slice(0,3).map(x => `
                        <div class="row"><span>Vol: ${(x.v/1000000).toFixed(2)}M</span><span>$${parseFloat(x.p).toLocaleString()}</span></div>
                    `).join('');
                };
                render('s-walls', a); render('b-walls', b);
            } catch(e) { console.log("Network Error"); }
        }

        function goBack() { 
            clearInterval(window.pInt); 
            document.getElementById('radar-ui').style.display = 'none'; 
            document.getElementById('search-screen').style.display = 'block'; 
        }
    </script>
</body>
</html>
