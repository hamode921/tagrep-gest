<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEZAR-PHANTOM</title>
</head>
<body style="background-color: #000; color: #fff; font-family: sans-serif; text-align: center;">

    <h1 style="color: #ffcc00; margin-top: 40px;">「 SEZAR-PHANTOM 」</h1>
    
    <input type="text" placeholder="... (Spot & Futures) ابحث" style="width: 80%; padding: 15px; border-radius: 20px; border: 1px solid #333; background: #111; color: #fff; margin-bottom: 30px;">

    <div id="list">
        <script>
            // القائمة الأصلية مع إضافة عملات الألفا
            const coins = [
                'BTCUSDT', 'ETHUSDT', 'BNBUSDT', 'SOLUSDT', 
                'PEPEUSDT', 'WIFUSDT', 'PIPPINUSDT', 'NEOUSDT', 
                'LTCUSDT', 'QTUMUSDT', 'ADAUSDT', 'XRPUSDT'
            ];

            coins.forEach(s => {
                document.write(`
                    <div style="background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 15px; padding: 20px; margin: 10px auto; width: 90%; display: flex; justify-content: space-between; align-items: center;">
                        <div style="color: #ffcc00; font-weight: bold; cursor: pointer;">🔭 تحليل</div>
                        <div>
                            <span style="background: #332200; color: #ffcc00; border: 1px solid #ffcc00; padding: 3px 8px; border-radius: 5px; font-size: 12px;">FUTURES</span>
                            <span style="font-size: 18px; font-weight: bold; margin-left: 10px;">${s}</span>
                        </div>
                    </div>
                `);
            });
        </script>
    </div>

</body>
</html>
