<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SEZAR-PHANTOM | نظام الحماية</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #000; color: #ffcc00; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-box { border: 2px solid #ffcc00; padding: 30px; border-radius: 15px; text-align: center; background: #0a0a0a; box-shadow: 0 0 20px #ffcc0044; }
        input { background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 5px; width: 220px; text-align: center; font-size: 18px; outline: none; margin-bottom: 10px; }
        button { background: #ffcc00; color: #000; padding: 12px 30px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #main-app { display: none; } /* الرادار مخفي بالبداية */
    </style>
</head>
<body>

    <div id="login-screen" class="login-box">
        <h2>「 SEZAR PHANTOM 」</h2>
        <p>أدخل كود الاشتراك للتفعيل</p>
        <input type="text" id="licenseKey" placeholder="أدخل الكود هنا">
        <br>
        <button onclick="checkAccess()">دخول النظام 🛡️</button>
        <p id="error-msg" style="color: red; font-size: 13px; margin-top: 10px;"></p>
    </div>

    <div id="main-app">
        <h1 style="text-align:center;">تم الدخول بنجاح يا بطل!</h1>
        </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAzEZksgZMPbY79K_TM3mHKeW1shQ6V-lY",
            authDomain: "sezar-phantom-auth.firebaseapp.com",
            projectId: "sezar-phantom-auth",
            storageBucket: "sezar-phantom-auth.firebasestorage.app",
            messagingSenderId: "112991314655",
            appId: "1:112991314655:web:cbca0b5c0c6b6e4f51ff6a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function checkAccess() {
            const key = document.getElementById('licenseKey').value;
            const errorMsg = document.getElementById('error-msg');
            
            if(!key) { errorMsg.innerText = "اكتب الكود أولاً!"; return; }

            const doc = await db.collection("users").doc(key).get();

            if (!doc.exists) {
                errorMsg.innerText = "الكود غلط أو غير مفعل!";
                return;
            }

            const userData = doc.data();
            const today = new Date().toISOString().split('T')[0];

            // 1. فحص تاريخ الانتهاء
            if (today > userData.expiry) {
                errorMsg.innerText = "اشتراكك خلص! تواصل مع سيزو للتجديد.";
                return;
            }

            // 2. فحص بصمة الجهاز (يقفل على أول جهاز يدخل منه)
            let myId = localStorage.getItem('sezar_device');
            if (!myId) {
                myId = 'DEV-' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('sezar_device', myId);
            }

            if (userData.deviceId && userData.deviceId !== myId) {
                errorMsg.innerText = "هذا الكود مفعل على جهاز ثاني!";
                return;
            }

            if (!userData.deviceId) {
                await db.collection("users").doc(key).update({ deviceId: myId });
            }

            // 3. فتح الرادار
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            alert("أهلاً بك يا " + userData.name + " في نظام سيزو!");
        }
    </script>
</body>
</html>
