<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEZAR-PHANTOM PRO ULTIMATE</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --gold: #fbbf24; --ghost: #a855f7; --bg: #000; --card: #080808; --red: #ef4444; --green: #22c55e; }
        body { background: var(--bg); color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        
        .lock-box { border: 2px solid var(--gold); padding: 30px; text-align: center; background: #000; margin-top: 15vh; border-radius: 15px; width: 300px; }
        .secure-note { color: #888; font-size: 11px; margin-bottom: 15px; line-height: 1.6; }
        input.pass { background: #111; border: 1px solid #333; color: var(--gold); padding: 12px; text-align: center; margin-bottom: 20px; width: 95%; outline: none; border-radius: 5px; font-size: 18px; }
        button.login-btn { background: var(--gold); color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 8px; width: 100%; font-size: 18px; margin-bottom: 20px; }

        #search-screen { display: none; width: 100%; max-width: 450px; text-align: center; margin-top: 20px; }
        .sezar-brand .sub-text { font-size: 28px; font-weight: bold; color: var(--gold); text-shadow: 0 0 15px rgba(251, 191, 36, 0.5); }
        .search-input { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 18px; width: 95%; border-radius: 15px; font-size: 16px; outline: none; text-align: center; margin-bottom: 30px; }
        .coin-item { background: #080808; border: 1px solid #222; padding: 15px; border-radius: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }

        #radar-ui { display: none; width: 100%; max-width: 450px; padding-bottom: 80px; }
        .header { border: 1px solid var(--gold); padding: 5px; text-align: center; margin-bottom: 15px; border-radius: 5px; position: relative; }
        .back-btn { position: absolute; left: 8px; top: 8px; background: var(--gold); color: #000; border: none; padding: 4px 10px; border-radius: 4px; font-size: 10px; font-weight: bold; cursor: pointer; }
        .price-box { border: 1px dashed #555; padding: 15px; text-align: center; font-size: 32px; font-weight: 900; background: #0a0a0a; color: #00d2ff; }
        .row { display: flex; justify-content: space-between; padding: 12px 5px; border-bottom: 1px solid #111; font-size: 13px; font-weight: bold; }
        .contact-dev { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 15px 0; display: flex; justify-content: space-around; border-top: 1px solid #222; }
        .contact-dev a { color: var(--gold); text-decoration: none; font-size: 11px; border: 1px solid var(--gold); padding: 8px 16px; border-radius: 5px; }
    </style>
</head>
<body onload="checkAuth()">

    <div id="auth-screen" class="lock-box">
        <div style="color:var(--gold); font-weight:bold; margin-bottom:20px;">🔒 تفعيل SEZAR-PHANTOM PRO</div>
        <div class="secure-note">هذا الرمز يعمل على جهاز واحد فقط</div>
        <input type="password" id="pass-key" class="pass" placeholder="•••••">
        <button onclick="activate()" class="login-btn">تسجيل دخول</button>
    </div>

    <div id="search-screen">
        <div class="sezar-brand"><span class="sub-text">「 SEZAR-PHANTOM 」</span></div>
        <input type="text" class="search-input" id="search-input" placeholder="🔍 ابحث عن عملة..." oninput="searchCoins()">
        <div id="results-list"></div>
    </div>

    <div id="radar-ui">
        <div class="header">
            <button class="back-btn" onclick="goBack()">🔙 رجوع</button>
            <h2 id="radar-title">「 SEZAR-PHANTOM 」</h2>
            <p id="current-coin-name" style="font-size:11px; margin:0;">[ BTCUSDT ]</p>
        </div>
        <div class="price-box" id="coin-price">Loading...</div>
        <div id="buy-sell-per" style="text-align:center; padding:10px;">BUY: --% | SELL: --%</div>
        <div id="s-walls"></div>
        <div id="b-walls" style="margin-top:20px;"></div>
        <div class="contact-dev"><a href="https://t.me/se44se">✈️ تليجرام</a><a href="mailto:sezarphantom@gmail.com">📧 الإيميل</a></div>
    </div>

    <script>
        // إعدادات الخزنة
        const firebaseConfig = {
            apiKey: "AIzaSyAzEZksgZMPbY79K_TM3mHKeW1shQ6V-lY",
            authDomain: "sezar-phantom-auth.firebaseapp.com",
            projectId: "sezar-phantom-auth",
            storageBucket: "sezar-phantom-auth.firebasestorage.app",
            messagingSenderId: "112991314655",
            appId: "1:112991314655:web:cbca0b5c0c6b6e4f51ff6a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentSymbol = 'BTCUSDT', currentMode = 'spot', allCoins = [], timeLeft = 30, pInt, lInt;

        // 1. فنكشن الفحص عند فتح الموقع (قفل الجهاز)
        async function checkAuth() {
            const savedKey = localStorage.getItem('sz_key');
            const myId = localStorage.getItem('sz_device_id');
            
            if (savedKey && myId) {
                const doc = await db.collection("users").doc(savedKey).get();
                if (doc.exists) {
                    const data = doc.data();
                    // إذا البصمة بالخزنة تختلف عن جهازي، اطردني فوراً
                    if (data.deviceId && data.deviceId !== myId) {
                        localStorage.clear();
                        location.reload();
                    } else {
                        showSearch();
                    }
                }
            }
        }

        // 2. فنكشن التفعيل لأول مرة (ربط الكود بالجهاز)
        async function activate() { 
            const k = document.getElementById('pass-key').value;
            if(!k) return;
            
            const doc = await db.collection("users").doc(k).get();
            if (doc.exists) {
                const data = doc.data();
                
                // صنع بصمة فريدة لهذا الجهاز إذا ماكو
                let myId = localStorage.getItem('sz_device_id');
                if (!myId) {
                    myId = 'DEV-' + Math.random().toString(36).substr(2, 9);
                    localStorage.setItem('sz_device_id', myId);
                }

                // منع الدخول إذا الكود محجوز لجهاز ثاني
                if (data.deviceId && data.deviceId !== myId) {
                    alert("❌ هذا الرمز مفعل على جهاز آخر مسبقاً!");
                    return;
                }

                // إذا الكود جديد، احجزه لهذا الجهاز هسة بالخزنة
                if (!data.deviceId) {
                    await db.collection("users").doc(k).update({ deviceId: myId });
                }

                localStorage.setItem('sz_key', k); 
                showSearch(); 
            } else { 
                alert("الرمز خطأ!"); 
            }
        }

        // باقي أوامر الرادار (كودك الأصلي)
        async function showSearch() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('search-screen').style.display = 'block';
            document.getElementById('radar-ui').style.display = 'none';
            if (allCoins.length === 0) {
                const res = await fetch('https://fapi.binance.com/fapi/v1/exchangeInfo');
                const data = await res.json();
                allCoins = data.symbols.filter(s => s.symbol.endsWith('USDT')).map(s => ({s: s.symbol, m: 'futures'}));
            }
            searchCoins();
        }

        function searchCoins() {
            const q = document.getElementById('search-input').value.toUpperCase();
            const list = document.getElementById('results-list');
            list.innerHTML = '';
            allCoins.filter(c => c.s.includes(q)).slice(0, 15).forEach(c => {
                const item = document.createElement('div');
                item.className = 'coin-item';
                item.innerHTML = `<span>${c.s}</span><span style="color:var(--gold)">تحليل 🔭</span>`;
                item.onclick = () => startRadar(c.s, c.m);
                list.appendChild(item);
            });
        }

        function startRadar(s, m) {
            currentSymbol = s; currentMode = m;
            document.getElementById('search-screen').style.display = 'none';
            document.getElementById('radar-ui').style.display = 'block';
            document.getElementById('current-coin-name').innerText = `[ ${s} ]`;
            updatePrice(); updateLiquidity();
            pInt = setInterval(updatePrice, 1000); lInt = setInterval(updateLiquidity, 30000);
        }

        async function updatePrice() {
            const r = await fetch(`https://fapi.binance.com/fapi/v1/ticker/price?symbol=${currentSymbol}`);
            const d = await r.json();
            document.getElementById('coin-price').innerText = '$' + parseFloat(d.price).toLocaleString();
        }

        async function updateLiquidity() {
            const r = await fetch(`https://fapi.binance.com/fapi/v1/depth?symbol=${currentSymbol}&limit=1000`);
            const d = await r.json();
            let b = d.bids.map(x => ({p: parseFloat(x[0]), v: parseFloat(x[0])*parseFloat(x[1])}));
            let a = d.asks.map(x => ({p: parseFloat(x[0]), v: parseFloat(x[0])*parseFloat(x[1])}));
            let tB = b.reduce((s,x)=>s+x.v,0), tS = a.reduce((s,x)=>s+x.v,0);
            document.getElementById('buy-sell-per').innerText = `BUY: ${(tB/(tB+tS)*100).toFixed(1)}% | SELL: ${(tS/(tB+tS)*100).toFixed(1)}%`;
            
            let wA = [...a].sort((x,y)=>y.v-x.v).slice(0,3).sort((x,y)=>x.p-y.p);
            document.getElementById('s-walls').innerHTML = `<div style="color:var(--red)">🔴 SELL WALLS:</div>` + wA.map(x => `<div class="row"><span>$${x.p.toLocaleString()}</span><span>${(x.v/1000000).toFixed(2)}M</span></div>`).join('');
            let wB = [...b].sort((x,y)=>y.v-x.v).slice(0,3).sort((x,y)=>x.p-y.p);
            document.getElementById('b-walls').innerHTML = `<div style="color:var(--green)">🟢 BUY WALLS:</div>` + wB.map(x => `<div class="row"><span>$${x.p.toLocaleString()}</span><span>${(x.v/1000000).toFixed(2)}M</span></div>`).join('');
        }

        function goBack() { clearInterval(pInt); clearInterval(lInt); showSearch(); }
    </script>
</body>
</html>
