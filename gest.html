<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SEZAR-PHANTOM PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --gold: #fbbf24; --bg: #000; --red: #ef4444; --green: #22c55e; }
        body { background: var(--bg); color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 10px; overflow-x: hidden; }
        
        /* شاشة الدخول */
        .lock-box { border: 2px solid var(--gold); padding: 30px; text-align: center; background: #000; margin-top: 15vh; border-radius: 15px; width: 280px; }
        input.pass { background: #111; border: 1px solid #333; color: var(--gold); padding: 12px; text-align: center; margin-bottom: 20px; width: 90%; border-radius: 5px; font-size: 18px; outline: none; }
        button.login-btn { background: var(--gold); color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 8px; width: 100%; font-size: 18px; }

        /* شاشة البحث والرادار */
        #search-screen, #radar-ui { display: none; width: 100%; max-width: 450px; text-align: center; }
        .search-input { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 15px; width: 90%; border-radius: 12px; font-size: 16px; outline: none; margin-bottom: 20px; }
        .coin-item { background: #080808; border: 1px solid #222; padding: 12px; border-radius: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .price-box { border: 1px dashed #444; padding: 10px; font-size: 32px; font-weight: bold; background: #050505; color: #00d2ff; margin-bottom: 5px; border-radius: 8px; }
        
        /* حاوية الشارت الاحترافي */
        #chart-wrapper { width: 100%; height: 300px; margin: 10px 0; border: 1px solid #222; border-radius: 10px; background: #000; overflow: hidden; position: relative; }

        .row { display: flex; justify-content: space-between; padding: 8px 5px; border-bottom: 1px solid #111; font-size: 12px; }
        .contact-dev { position: fixed; bottom: 0; width: 100%; background: #000; padding: 15px 0; display: flex; justify-content: space-around; border-top: 1px solid #222; z-index: 1000; }
        .contact-dev a { color: var(--gold); text-decoration: none; border: 1px solid var(--gold); padding: 8px 15px; border-radius: 6px; font-size: 12px; }
    </style>
</head>
<body onload="checkSaved()">

    <div id="auth-screen" class="lock-box">
        <div style="color:var(--gold); font-weight:bold; margin-bottom:20px;">🔒 SEZAR-PHANTOM PRO</div>
        <input type="password" id="pass-key" class="pass" placeholder="كود التفعيل">
        <button onclick="activate()" class="login-btn">دخول</button>
    </div>

    <div id="search-screen">
        <h2 style="color:var(--gold);">「 SEZAR-PHANTOM 」</h2>
        <input type="text" class="search-input" id="search-input" placeholder="🔍 ابحث عن عملة..." oninput="searchCoins()">
        <div id="results-list"></div>
    </div>

    <div id="radar-ui">
        <div style="border:1px solid var(--gold); padding:10px; border-radius:10px; position:relative; margin-bottom:10px;">
            <button onclick="goBack()" style="position:absolute; left:10px; top:12px; background:var(--gold); border:none; padding:5px 10px; border-radius:5px; font-size:12px; font-weight:bold;">🔙</button>
            <h3 id="current-coin-name" style="margin:0; color:var(--gold);">---</h3>
        </div>
        <div class="price-box" id="coin-price">0.00</div>
        
        <div id="chart-wrapper"></div>

        <div id="buy-sell-per" style="padding:10px; font-weight:bold; font-size:13px; color:#aaa;">BUY: --% | SELL: --%</div>
        <div id="s-walls"></div>
        <div id="b-walls" style="margin-top:10px; margin-bottom:80px;"></div>
        <div class="contact-dev"><a href="https://t.me/se44se">✈️ المطور</a></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAzEZksgZMPbY79K_TM3mHKeW1shQ6V-lY",
            authDomain: "sezar-phantom-auth.firebaseapp.com",
            projectId: "sezar-phantom-auth",
            storageBucket: "sezar-phantom-auth.firebasestorage.app",
            messagingSenderId: "112991314655",
            appId: "1:112991314655:web:cbca0b5c0c6b6e4f51ff6a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let allCoins = [], pInt, lInt, chart, candleSeries;

        async function checkSaved() {
            const k = localStorage.getItem('sz_key');
            if (k) {
                const doc = await db.collection("users").doc(k).get();
                if (doc.exists) showSearch();
            }
        }

        async function activate() { 
            const k = document.getElementById('pass-key').value;
            const doc = await db.collection("users").doc(k).get();
            if (doc.exists) { localStorage.setItem('sz_key', k); showSearch(); }
        }

        async function showSearch() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('search-screen').style.display = 'block';
            document.getElementById('radar-ui').style.display = 'none';
            if (allCoins.length === 0) {
                const r = await fetch('https://fapi.binance.com/fapi/v1/exchangeInfo');
                const d = await r.json();
                allCoins = d.symbols.filter(s => s.symbol.endsWith('USDT')).map(s => s.symbol);
            }
        }

        function searchCoins() {
            const q = document.getElementById('search-input').value.toUpperCase();
            const list = document.getElementById('results-list'); list.innerHTML = '';
            allCoins.filter(c => c.includes(q)).slice(0, 8).forEach(c => {
                const item = document.createElement('div');
                item.className = 'coin-item';
                item.innerHTML = `<span>${c}</span><span style="color:var(--gold)">🔭</span>`;
                item.onclick = () => startRadar(c); list.appendChild(item);
            });
        }

        async function startRadar(s) {
            document.getElementById('search-screen').style.display = 'none';
            document.getElementById('radar-ui').style.display = 'block';
            document.getElementById('current-coin-name').innerText = s;
            
            // تهيئة الشارت
            const chartDiv = document.getElementById('chart-wrapper');
            chartDiv.innerHTML = '';
            chart = LightweightCharts.createChart(chartDiv, {
                layout: { backgroundColor: '#000', textColor: '#888', fontSize: 11 },
                grid: { vertLines: { color: '#111' }, horzLines: { color: '#111' } },
                timeScale: { borderColor: '#222', timeVisible: true },
                rightPriceScale: { borderColor: '#222' }
            });
            candleSeries = chart.addCandlestickSeries({
                upColor: '#22c55e', downColor: '#ef4444', 
                borderUpColor: '#22c55e', borderDownColor: '#ef4444',
                wickUpColor: '#22c55e', wickDownColor: '#ef4444'
            });

            // تحميل بيانات تاريخية
            const res = await fetch(`https://fapi.binance.com/fapi/v1/klines?symbol=${s}&interval=1m&limit=100`);
            const data = await res.json();
            const initialData = data.map(d => ({
                time: d[0] / 1000, open: parseFloat(d[1]), high: parseFloat(d[2]), low: parseFloat(d[3]), close: parseFloat(d[4])
            }));
            candleSeries.setData(initialData);

            updatePrice(s); updateLiq(s);
            pInt = setInterval(() => updatePrice(s), 2000); 
            lInt = setInterval(() => updateLiq(s), 30000);
        }

        async function updatePrice(s) {
            const res = await fetch(`https://fapi.binance.com/fapi/v1/ticker/price?symbol=${s}`);
            const data = await res.json();
            const price = parseFloat(data.price);
            document.getElementById('coin-price').innerText = '$' + price.toLocaleString();
            
            // تحديث الشارت حي
            if(candleSeries) {
                candleSeries.update({
                    time: Math.floor(Date.now() / 1000),
                    close: price
                });
            }
        }

            const res =
