<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEZAR-PHANTOM PRO ULTIMATE</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --gold: #fbbf24; --ghost: #a855f7; --bg: #000; --card: #080808; --red: #ef4444; --green: #22c55e; }
        body { background: var(--bg); color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        .lock-box { border: 2px solid var(--gold); padding: 30px; text-align: center; background: #000; margin-top: 15vh; border-radius: 15px; width: 300px; display: block; }
        input.pass { background: #111; border: 1px solid #333; color: var(--gold); padding: 12px; text-align: center; margin-bottom: 20px; width: 95%; outline: none; border-radius: 5px; font-size: 18px; }
        button.login-btn { background: var(--gold); color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 8px; width: 100%; font-size: 18px; }
        #search-screen, #radar-ui { display: none; width: 100%; max-width: 450px; text-align: center; }
        /* ستايلات رادارك الأصلية تبقى تحت هنا بدون تغيير */
        .sezar-brand { margin-bottom: 30px; }
        .sezar-brand .sub-text { font-size: 28px; font-weight: bold; color: var(--gold); text-shadow: 0 0 15px rgba(251, 191, 36, 0.5); }
        .search-input { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 18px; width: 95%; border-radius: 15px; font-size: 16px; outline: none; text-align: center; margin-bottom: 30px; }
        .coin-item { background: #080808; border: 1px solid #222; padding: 15px; border-radius: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .price-box { border: 1px dashed #555; padding: 15px; text-align: center; font-size: 32px; font-weight: 900; background: #0a0a0a; color: #00d2ff; }
        .row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #111; font-size: 13px; }
        .ball { width: 12px; height: 12px; border-radius: 50%; margin: 2px; }
        #power-bar { display: flex; justify-content: center; margin: 15px 0; }
        .contact-dev { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; padding: 10px; display: flex; justify-content: space-around; border-top: 1px solid #222; }
        .contact-dev a { color: var(--gold); text-decoration: none; font-size: 12px; border: 1px solid var(--gold); padding: 5px 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="auth-screen" class="lock-box">
        <div style="color:var(--gold); font-weight:bold; margin-bottom:20px;">🔒 نظام حماية سيزو فانتوم</div>
        <input type="text" id="pass-key" class="pass" placeholder="أدخل كود التفعيل">
        <button onclick="activate()" class="login-btn">تفعيل ودخول</button>
        <p id="err" style="color:red; font-size:11px; margin-top:10px;"></p>
    </div>

    <div id="search-screen">
        <div class="sezar-brand"><span class="sub-text">「 SEZAR-PHANTOM 」</span></div>
        <input type="text" class="search-input" id="search-input" placeholder="🔍 ابحث عن عملة..." oninput="searchCoins()">
        <div id="results-list"></div>
    </div>

    <div id="radar-ui">
        <div style="border:1px solid var(--gold); padding:10px; border-radius:10px; position:relative;">
            <button onclick="goBack()" style="position:absolute; left:10px; background:var(--gold); border:none; border-radius:5px; padding:5px;">رجوع</button>
            <h3>SEZAR-PHANTOM</h3>
            <p id="current-coin-name">---</p>
        </div>
        <div class="price-box" id="coin-price">0.00</div>
        <div id="buy-sell-per" style="margin-top:10px;">BUY: --% | SELL: --%</div>
        <div id="power-bar"></div>
        <div id="sig-box" style="padding:15px; border-radius:10px; font-weight:bold;">ANALYZING...</div>
        <div class="contact-dev"><a href="https://t.me/se44se">تليجرام</a><a href="mailto:sezarphantom@gmail.com">الإيميل</a></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAzEZksgZMPbY79K_TM3mHKeW1shQ6V-lY",
            authDomain: "sezar-phantom-auth.firebaseapp.com",
            projectId: "sezar-phantom-auth",
            storageBucket: "sezar-phantom-auth.firebasestorage.app",
            messagingSenderId: "112991314655",
            appId: "1:112991314655:web:cbca0b5c0c6b6e4f51ff6a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let allCoins = [], pInt, lInt;

        async function activate() {
            const key = document.getElementById('pass-key').value;
            const err = document.getElementById('err');
            if(!key) return;

            const doc = await db.collection("users").doc(key).get();
            if(doc.exists) {
                const data = doc.data();
                
                // بصمة الجهاز
                let myID = localStorage.getItem('sezar_device_id');
                if(!myID) {
                    myID = 'DEV-' + Math.random().toString(36).substr(2, 9);
                    localStorage.setItem('sezar_device_id', myID);
                }

                if(data.deviceId && data.deviceId !== myID) {
                    err.innerText = "❌ هذا الكود مفعل على جهاز آخر!";
                    return;
                }

                if(!data.deviceId) {
                    await db.collection("users").doc(key).update({ deviceId: myID });
                }

                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('search-screen').style.display = 'block';
                loadAll();
            } else {
                err.innerText = "❌ الكود غير صحيح!";
            }
        }

        async function loadAll() {
            const r = await fetch('https://api.binance.com/api/v3/exchangeInfo');
            const d = await r.json();
            allCoins = d.symbols.filter(s => s.symbol.endsWith('USDT')).map(s => s.symbol);
            searchCoins();
        }

        function searchCoins() {
            const q = document.getElementById('search-input').value.toUpperCase();
            const list = document.getElementById('results-list');
            list.innerHTML = '';
            allCoins.filter(c => c.includes(q)).slice(0, 10).forEach(c => {
                const div = document.createElement('div');
                div.className = 'coin-item';
                div.innerHTML = `<span>${c}</span><span style="color:var(--gold)">تحليل 🔭</span>`;
                div.onclick = () => startRadar(c);
                list.appendChild(div);
            });
        }

        function startRadar(s) {
            document.getElementById('search-screen').style.display = 'none';
            document.getElementById('radar-ui').style.display = 'block';
            document.getElementById('current-coin-name').innerText = s;
            clearInterval(pInt); clearInterval(lInt);
            updatePrice(s); updateLiq(s);
            pInt = setInterval(() => updatePrice(s), 2000);
            lInt = setInterval(() => updateLiq(s), 30000);
        }

        async function updatePrice(s) {
            const r = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${s}`);
            const d = await r.json();
            document.getElementById('coin-price').innerText = '$' + parseFloat(d.price).toLocaleString();
        }

        async function updateLiq(s) {
            const r = await fetch(`https://api.binance.com/api/v3/depth?symbol=${s}&limit=100`);
            const d = await r.json();
            let b = d.bids.reduce((a,c)=>a+parseFloat(c[1]),0), a = d.asks.reduce((a,c)=>a+parseFloat(c[1]),0);
            let bP = (b/(b+a)*100).toFixed(1), aP = (100-bP).toFixed(1);
            document.getElementById('buy-sell-per').innerText = `BUY: ${bP}% | SELL: ${aP}%`;
            let bar = document.getElementById('power-bar'); bar.innerHTML = '';
            for(let i=0; i<10; i++) bar.innerHTML += `<div class="ball" style="background:${i<(bP/10)?'var(--green)':'var(--red)'}"></div>`;
        }

        function goBack() { 
            document.getElementById('search-screen').style.display = 'block'; 
            document.getElementById('radar-ui').style.display = 'none'; 
            clearInterval(pInt); clearInterval(lInt);
        }
    </script>
</body>
</html>
