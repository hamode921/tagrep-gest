<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEZAR ALPHA PRO</title>
    <style>
        :root { --gold: #ffcc00; --bg: #000; --card: #080808; --cyan: #00d2ff; }
        body { background: var(--bg); color: #fff; font-family: monospace; padding: 10px; margin: 0; }
        .header { border: 2px solid var(--gold); border-radius: 12px; padding: 15px; text-align: center; margin-bottom: 15px; }
        
        /* خانة البحث */
        .search-box { width: 95%; padding: 15px; border-radius: 10px; border: 1px solid #333; background: #111; color: #fff; margin-bottom: 20px; outline: none; text-align: center; }

        /* كارت العملة */
        .alpha-card { background: var(--card); border: 1px solid #1a1a1a; border-radius: 15px; padding: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .alpha-card:active { transform: scale(0.98); background: #111; }
        
        .p-main { font-size: 22px; font-weight: 900; color: var(--cyan); }
        .up { color: #22c55e; } .down { color: #ef4444; }
        .symbol-name { font-size: 20px; font-weight: bold; color: var(--gold); }
        .tag { background: #332200; color: var(--gold); padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; border: 1px solid var(--gold); }

        /* واجهة الرادار (مخفية) */
        #radar-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; padding: 15px; box-sizing: border-box; }
        .back-btn { background: var(--gold); color: #000; padding: 8px 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="main-screen">
        <div class="header">
            <h1 style="margin:0; font-size: 24px;">「 SEZAR-PHANTOM ALPHA 」</h1>
            <div id="count" style="font-size:12px; color:var(--gold); margin-top:5px;">SCANNING...</div>
        </div>

        <input type="text" class="search-box" id="searchInput" placeholder="🔍 ابحث عن عملة ألفا..." oninput="filterAlpha()">

        <div id="alpha-list"></div>
    </div>

    <div id="radar-screen">
        <button class="back-btn" onclick="closeRadar()">🔙 رجوع</button>
        <div style="border:1px solid var(--gold); padding:20px; border-radius:15px; text-align:center;">
            <h2 id="radar-coin-name" style="color:var(--gold);">---</h2>
            <div id="radar-price" style="font-size: 45px; color:var(--cyan); font-weight:bold;">$0.00</div>
            <div id="radar-status" style="margin-top:20px; font-weight:bold;">جاري تحليل السيولة...</div>
            </div>
    </div>

    <script>
        let allAlpha = [];

        async function scanAlpha() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/ticker/24hr');
                const data = await res.json();
                
                // فلترة الألفا الحقيقية
                allAlpha = data.filter(c => c.symbol.endsWith('USDT') && parseFloat(c.quoteVolume) > 500000);
                allAlpha.sort((a, b) => parseFloat(b.priceChangePercent) - parseFloat(a.priceChangePercent));
                
                renderList(allAlpha);
                document.getElementById('count').innerText = `LIVE: ${allAlpha.length} ALPHA COINS DETECTED`;
            } catch (e) { console.log("Error"); }
        }

        function renderList(list) {
            const cont = document.getElementById('alpha-list');
            cont.innerHTML = '';
            list.forEach(c => {
                const change = parseFloat(c.priceChangePercent);
                cont.innerHTML += `
                    <div class="alpha-card" onclick="openRadar('${c.symbol}')">
                        <div>
                            <div class="${change >= 0 ? 'up' : 'down'}" style="font-weight:bold;">${change}%</div>
                            <div class="p-main">$${parseFloat(c.lastPrice).toFixed(4)}</div>
                        </div>
                        <div style="text-align:right;">
                            <span class="tag">LIVE ALPHA</span>
                            <div class="symbol-name">${c.symbol.replace('USDT','')}</div>
                        </div>
                    </div>
                `;
            });
        }

        function filterAlpha() {
            const q = document.getElementById('searchInput').value.toUpperCase();
            const filtered = allAlpha.filter(c => c.symbol.includes(q));
            renderList(filtered);
        }

        function openRadar(symbol) {
            document.getElementById('main-screen').style.display = 'none';
            document.getElementById('radar-screen').style.display = 'block';
            document.getElementById('radar-coin-name').innerText = `[ ${symbol} ]`;
            // هنا تشغل WebSocket مالتك القديمة للتحليل
            document.getElementById('radar-price').innerText = "تحليل حي...";
        }

        function closeRadar() {
            document.getElementById('main-screen').style.display = 'block';
            document.getElementById('radar-screen').style.display = 'none';
        }

        setInterval(scanAlpha, 5000);
        scanAlpha();
    </script>
</body>
</html>
