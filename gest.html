<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEZAR-PHANTOM PRO ULTIMATE</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --gold: #fbbf24; --ghost: #a855f7; --bg: #000; --card: #080808; --red: #ef4444; --green: #22c55e; }
        body { background: var(--bg); color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        .lock-box { border: 2px solid var(--gold); padding: 30px; text-align: center; background: #000; margin-top: 15vh; border-radius: 15px; width: 300px; }
        input.pass { background: #111; border: 1px solid #333; color: var(--gold); padding: 12px; text-align: center; margin-bottom: 20px; width: 95%; border-radius: 5px; font-size: 18px; outline: none; }
        button.login-btn { background: var(--gold); color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 8px; width: 100%; font-size: 18px; }
        #search-screen { display: none; width: 100%; max-width: 450px; text-align: center; margin-top: 20px; }
        .sezar-brand .sub-text { font-size: 28px; font-weight: bold; color: var(--gold); text-shadow: 0 0 15px rgba(251, 191, 36, 0.5); }
        .search-input { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 18px; width: 95%; border-radius: 15px; font-size: 16px; outline: none; text-align: center; margin-bottom: 30px; }
        .coin-item { background: #080808; border: 1px solid #222; padding: 15px; border-radius: 15px; cursor: pointer; display: flex; justify-content: space-between; margin-bottom: 10px; }
        #radar-ui { display: none; width: 100%; max-width: 450px; }
        .price-box { border: 1px dashed #555; padding: 15px; text-align: center; font-size: 32px; font-weight: 900; background: #0a0a0a; color: #00d2ff; }
    </style>
</head>
<body>

    <div id="auth-screen" class="lock-box">
        <div style="color:var(--gold); font-weight:bold; margin-bottom:20px;">🔒 تفعيل نظام سيزو</div>
        <input type="text" id="pass-key" class="pass" placeholder="أدخل الكود">
        <button onclick="activate()" class="login-btn">دخول</button>
        <p id="error-msg" style="color:red; font-size:10px;"></p>
    </div>

    <div id="search-screen">
        <div class="sezar-brand"><span class="sub-text">「 SEZAR-PHANTOM 」</span></div>
        <input type="text" class="search-input" id="search-input" placeholder="🔍 ابحث عن عملة..." oninput="searchCoins()">
        <div id="results-list"></div>
    </div>

    <div id="radar-ui">
        <div style="border:1px solid var(--gold); padding:10px; text-align:center; border-radius:5px;">
            <h2 id="radar-title">「 سيزو فانتوم 」</h2>
            <p id="current-coin-name">[ BTCUSDT ]</p>
        </div>
        <div class="price-box" id="coin-price">جاري التحميل...</div>
        <button onclick="location.reload()" style="background:var(--gold); margin-top:20px; padding:10px; width:100%; border-radius:5px; font-weight:bold;">خروج / قفل</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAzEZksgZMPbY79K_TM3mHKeW1shQ6V-lY",
            authDomain: "sezar-phantom-auth.firebaseapp.com",
            projectId: "sezar-phantom-auth",
            storageBucket: "sezar-phantom-auth.firebasestorage.app",
            messagingSenderId: "112991314655",
            appId: "1:112991314655:web:cbca0b5c0c6b6e4f51ff6a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let allCoins = [];

        async function activate() {
            const key = document.getElementById('pass-key').value;
            const res = await db.collection("users").doc(key).get();
            if (res.exists) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('search-screen').style.display = 'block';
                loadCoins();
            } else { alert("الكود غلط!"); }
        }

        async function loadCoins() {
            const r = await fetch('https://api.binance.com/api/v3/exchangeInfo');
            const d = await r.json();
            allCoins = d.symbols.filter(s => s.symbol.endsWith('USDT')).map(s => s.symbol);
            searchCoins();
        }

        function searchCoins() {
            const q = document.getElementById('search-input').value.toUpperCase();
            const list = document.getElementById('results-list');
            list.innerHTML = '';
            allCoins.filter(c => c.includes(q)).slice(0, 10).forEach(c => {
                const div = document.createElement('div');
                div.className = 'coin-item';
                div.innerText = c;
                div.onclick = () => {
                    document.getElementById('search-screen').style.display = 'none';
                    document.getElementById('radar-ui').style.display = 'block';
                    document.getElementById('current-coin-name').innerText = c;
                    startPrice(c);
                };
                list.appendChild(div);
            });
        }

        function startPrice(s) {
            setInterval(async () => {
                const r = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${s}`);
                const d = await r.json();
                document.getElementById('coin-price').innerText = parseFloat(d.price).toFixed(2) + " $";
            }, 2000);
        }
    </script>
</body>
</html>
