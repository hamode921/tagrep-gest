<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEZAR-PHANTOM PRO ULTIMATE</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --gold: #fbbf24; --bg: #000; --red: #ef4444; }
        body { background: var(--bg); color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        .lock-box { border: 2px solid var(--gold); padding: 30px; text-align: center; background: #000; margin-top: 15vh; border-radius: 15px; width: 300px; }
        #expiry-msg { display: none; color: var(--red); font-size: 12px; margin-bottom: 20px; border: 1px solid var(--red); padding: 12px; border-radius: 8px; font-weight: bold; line-height: 1.6; }
        input.pass { background: #111; border: 1px solid #333; color: var(--gold); padding: 12px; text-align: center; margin-bottom: 20px; width: 95%; outline: none; border-radius: 5px; font-size: 18px; }
        button.login-btn { background: var(--gold); color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 8px; width: 100%; font-size: 18px; }
        #search-screen, #radar-ui { display: none; width: 100%; max-width: 450px; text-align: center; }
        .search-input { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 18px; width: 95%; border-radius: 15px; font-size: 16px; outline: none; text-align: center; margin-bottom: 30px; }
        .coin-item { background: #080808; border: 1px solid #222; padding: 15px; border-radius: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .price-box { border: 1px dashed #555; padding: 15px; text-align: center; font-size: 32px; font-weight: 900; background: #0a0a0a; color: #00d2ff; }
        .row { display: flex; justify-content: space-between; padding: 12px 5px; border-bottom: 1px solid #111; font-size: 13px; }
        .contact-dev { position: fixed; bottom: 0; width: 100%; background: #000; padding: 15px 0; display: flex; justify-content: space-around; border-top: 1px solid #222; }
        .contact-dev a { color: var(--gold); text-decoration: none; border: 1px solid var(--gold); padding: 8px 16px; border-radius: 5px; font-size: 11px; }
    </style>
</head>
<body onload="checkAuth()">

    <div id="auth-screen" class="lock-box">
        <div id="expiry-msg">
            ⚠️ انتهى اشتراكك<br>
            لتجديد الاشتراك يرجى التواصل مع المطور:<br>
            <a href="https://t.me/se44se" target="_blank" style="color:white; text-decoration:underline;">t.me/se44se</a>
        </div>
        <div style="color:var(--gold); font-weight:bold; margin-bottom:20px;">🔒 تفعيل SEZAR-PHANTOM PRO</div>
        <input type="password" id="pass-key" class="pass" placeholder="•••••">
        <button onclick="activate()" class="login-btn">تسجيل دخول</button>
        <div id="error-msg" style="color:var(--red); font-size:12px; margin-top:10px; display:none;"></div>
    </div>

    <div id="search-screen">
        <h2 style="color:var(--gold);">「 SEZAR-PHANTOM 」</h2>
        <input type="text" class="search-input" id="search-input" placeholder="🔍 ابحث عن عملة..." oninput="searchCoins()">
        <div id="results-list"></div>
    </div>

    <div id="radar-ui">
        <div style="border:1px solid var(--gold); padding:10px; border-radius:5px; position:relative; margin-bottom:15px;">
            <button onclick="goBack()" style="position:absolute; left:8px; top:8px; background:var(--gold); border:none; padding:4px 10px; border-radius:4px; font-size:10px; font-weight:bold; cursor:pointer;">🔙 رجوع</button>
            <h2 style="margin:0; color:var(--gold);">「 SEZAR-PHANTOM 」</h2>
            <p id="current-coin-name" style="margin:5px 0 0 0; font-size:11px;">[ BTCUSDT ]</p>
        </div>
        <div class="price-box" id="coin-price">Loading...</div>
        <div id="buy-sell-per" style="text-align:center; padding:15px; font-weight:bold;">BUY: --% | SELL: --%</div>
        <div id="s-walls"></div>
        <div id="b-walls" style="margin-top:20px;"></div>
        <div class="contact-dev"><a href="https://t.me/se44se">✈️ تليجرام</a></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAzEZksgZMPbY79K_TM3mHKeW1shQ6V-lY",
            authDomain: "sezar-phantom-auth.firebaseapp.com",
            projectId: "sezar-phantom-auth",
            storageBucket: "sezar-phantom-auth.firebasestorage.app",
            messagingSenderId: "112991314655",
            appId: "1:112991314655:web:cbca0b5c0c6b6e4f51ff6a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let allCoins = [], pInt, lInt;

        // نظام الفحص الحي - يطرد المستخدم فور تغيير التاريخ بالخزنة
        function checkAuth() {
            const k = localStorage.getItem('sz_ultimate_v1_key');
            const myId = localStorage.getItem('sz_device_id');
            if (!k || !myId) return;

            db.collection("users").doc(k).onSnapshot((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    const now = new Date();
                    const exp = new Date(data.expiryDate);

                    if (data.expiryDate && now > exp) {
                        localStorage.clear();
                        location.reload();
                        return;
                    }
                    if (data.deviceId && data.deviceId !== myId) {
                        localStorage.clear();
                        location.reload();
                        return;
                    }
                    if (document.getElementById('auth-screen').style.display !== 'none') showSearch();
                }
            });
        }

        async function activate() { 
            const k = document.getElementById('pass-key').value;
            const err = document.getElementById('error-msg');
            const expNotice = document.getElementById('expiry-msg');
            err.style.display = 'none'; expNotice.style.display = 'none';
            if(!k) return;

            const doc = await db.collection("users").doc(k).get();
            if (doc.exists) { 
                const data = doc.data();
                let myId = localStorage.getItem('sz_device_id') || 'DEV-' + Math.random().toString(36).substr(2, 9);
                
                if (data.expiryDate && new Date() > new Date(data.expiryDate)) {
                    expNotice.style.display = 'block'; return;
                }
                if (data.deviceId && data.deviceId !== myId) {
                    err.innerText = "❌ مفعل بجهاز آخر!"; err.style.display = 'block'; return;
                }
                
                if (!data.deviceId) await db.collection("users").doc(k).update({ deviceId: myId });
                localStorage.setItem('sz_device_id', myId);
                localStorage.setItem('sz_ultimate_v1_key', k); 
                checkAuth(); 
            } else { err.innerText = "❌ الكود غلط!"; err.style.display = 'block'; }
        }

        async function showSearch() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('search-screen').style.display = 'block';
            if (allCoins.length === 0) {
                const r = await fetch('https://fapi.binance.com/fapi/v1/exchangeInfo');
                const d = await r.json();
                allCoins = d.symbols.filter(s => s.symbol.endsWith('USDT')).map(s => s.symbol);
            }
            searchCoins();
        }

        function searchCoins() {
            const q = document.getElementById('search-input').value.toUpperCase();
            const list = document.getElementById('results-list'); list.innerHTML = '';
            allCoins.filter(c => c.includes(q)).slice(0, 10).forEach(c => {
                const item = document.createElement('div');
                item.className = 'coin-item';
                item.innerHTML = `<span>${c}</span><span style="color:var(--gold)">تحليل 🔭</span>`;
                item.onclick = () => startRadar(c); list.appendChild(item);
            });
        }

        function startRadar(s) {
            document.getElementById('search-screen').style.display = 'none';
            document.getElementById('radar-ui').style.display = 'block';
            document.getElementById('current-coin-name').innerText = `[ ${s} ]`;
            updatePrice(s); updateLiq(s);
            pInt = setInterval(() => updatePrice(s), 1000); lInt = setInterval(() => updateLiq(s), 30000);
        }

        async function updatePrice(s) {
            const res = await fetch(`https://fapi.binance.com/fapi/v1/ticker/price?symbol=${s}`);
            const data = await res.json();
            document.getElementById('coin-price').innerText = '$' + parseFloat(data.price).toLocaleString();
        }

        async function updateLiq(s) {
            const res = await fetch(`https://fapi.binance.com/fapi/v1/depth?symbol=${s}&limit=500`);
            const data = await res.json();
            let b = data.bids.map(x => ({p: x[0], v: x[0]*x[1]})), a = data.asks.map(x => ({p: x[0], v: x[0]*x[1]}));
            let tB = b.reduce((s,x)=>s+x.v,0), tS = a.reduce((s,x)=>s+x.v,0);
            document.getElementById('buy-sell-per').innerText = `BUY: ${(tB/(tB+tS)*100).toFixed(1)}% | SELL: ${(tS/(tB+tS)*100).toFixed(1)}%`;
            const render = (target, list) => {
                document.getElementById(target).innerHTML = list.sort((x,y)=>y.v-x.v).slice(0,3).map(x => `
                    <div class="row"><span>${(x.v/1000000).toFixed(2)}M</span><span>$${parseFloat(x.p).toLocaleString()}</span></div>
                `).join('');
            };
            render('s-walls', a); render('b-walls', b);
        }

        function goBack() { clearInterval(pInt); clearInterval(lInt); document.getElementById('radar-ui').style.display = 'none'; showSearch(); }
    </script>
</body>
</html>
