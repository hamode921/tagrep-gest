<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEZAR-PHANTOM ALPHA PRO</title>
    <style>
        :root { --gold: #ffcc00; --bg: #000; --card: #080808; --cyan: #00d2ff; --red: #ff4d4d; --green: #00ff00; }
        body { background: var(--bg); color: #fff; font-family: monospace; padding: 10px; margin: 0; }
        .header { border: 2px solid var(--gold); border-radius: 12px; padding: 15px; text-align: center; margin-bottom: 15px; }
        .search-box { width: 95%; padding: 15px; border-radius: 10px; border: 1px solid #333; background: #111; color: #fff; margin-bottom: 20px; text-align: center; outline: none; }
        .alpha-card { background: var(--card); border: 1px solid #1a1a1a; border-radius: 15px; padding: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; cursor: pointer; }

        /* شاشة الرادار الاحترافية */
        #radar-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; padding: 15px; box-sizing: border-box; overflow-y: auto; }
        .back-btn { background: var(--gold); color: #000; padding: 8px 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; float: left; }
        .radar-header { border: 1px solid var(--gold); border-radius: 15px; padding: 20px; margin-top: 50px; text-align: center; }
        .price-big { font-size: 45px; color: var(--cyan); font-weight: bold; margin: 10px 0; }
        
        .wall-box { margin-top: 20px; }
        .wall-row { display: flex; justify-content: space-between; padding: 10px 5px; border-bottom: 1px solid #111; font-size: 13px; font-weight: bold; }
        .perc-tag { color: var(--gold); font-size: 10px; background: rgba(251, 191, 36, 0.1); padding: 2px 8px; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="main-screen">
        <div class="header">
            <h1 style="margin:0; font-size: 24px;">「 SEZAR-PHANTOM ALPHA 」</h1>
            <div id="count" style="font-size:12px; color:var(--gold); margin-top:5px;">SCANNING SOURCE...</div>
        </div>
        <input type="text" class="search-box" id="searchInput" placeholder="🔍 ابحث عن عملة ألفا..." oninput="filterAlpha()">
        <div id="alpha-list"></div>
    </div>

    <div id="radar-screen">
        <button class="back-btn" onclick="closeRadar()">🔙 رجوع</button>
        <div class="radar-header">
            <h2 id="radar-coin-name" style="color:var(--gold); margin:0;">[ --- ]</h2>
            <div class="price-big" id="radar-price">$0.00</div>
            <div id="radar-stats" style="font-weight:bold; font-size:14px;">BUY: --% | SELL: --%</div>
        </div>

        <div class="wall-box">
            <div style="color:var(--red); font-weight:bold; margin-bottom:10px;">SELL WALLS 🔴</div>
            <div id="s-walls"></div>
            
            <div style="color:var(--green); font-weight:bold; margin:20px 0 10px 0;">BUY WALLS 🟢</div>
            <div id="b-walls"></div>
        </div>
    </div>

    <script>
        let allAlpha = [], ws;

        async function scanAlpha() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/ticker/24hr');
                const data = await res.json();
                allAlpha = data.filter(c => c.symbol.endsWith('USDT') && parseFloat(c.quoteVolume) > 500000);
                allAlpha.sort((a, b) => parseFloat(b.priceChangePercent) - parseFloat(a.priceChangePercent));
                renderList(allAlpha);
                document.getElementById('count').innerText = `LIVE: ${allAlpha.length} ALPHA COINS`;
            } catch (e) { console.log("Error Fetching Source"); }
        }

        function renderList(list) {
            const cont = document.getElementById('alpha-list');
            cont.innerHTML = '';
            list.forEach(c => {
                const ch = parseFloat(c.priceChangePercent);
                cont.innerHTML += `
                    <div class="alpha-card" onclick="openRadar('${c.symbol}')">
                        <div><div style="color:${ch>=0?'var(--green)':'var(--red)'}; font-weight:bold;">${ch}%</div><div style="font-size:18px; font-weight:bold; color:var(--cyan);">$${parseFloat(c.lastPrice).toFixed(4)}</div></div>
                        <div style="text-align:right;"><span style="color:var(--gold); font-weight:bold;">${c.symbol}</span></div>
                    </div>`;
            });
        }

        function openRadar(symbol) {
            document.getElementById('main-screen').style.display = 'none';
            document.getElementById('radar-screen').style.display = 'block';
            document.getElementById('radar-coin-name').innerText = `[ ${symbol} ]`;
            
            if(ws) ws.close();
            // الربط مع سيرفر بايننس (WebSocket) للجدران الحية
            ws = new WebSocket(`wss://stream.binance.com:9443/ws/${symbol.toLowerCase()}@depth20@100ms`);
            
            ws.onmessage = (e) => {
                const d = JSON.parse(e.data);
                const price = d.a[0][0];
                document.getElementById('radar-price').innerText = `$${parseFloat(price).toLocaleString()}`;
                
                let tb=0, ts=0;
                d.b.forEach(b => tb += (parseFloat(b[0]) * parseFloat(b[1]))); 
                d.a.forEach(a => ts += (parseFloat(a[0]) * parseFloat(a[1])));
                const bP = (tb/(tb+ts)*100).toFixed(1);
                
                document.getElementById('radar-stats').innerHTML = `<span style="color:var(--green)">BUY: ${bP}%</span> | <span style="color:var(--red)">SELL: ${(100-bP).toFixed(1)}%</span>`;

                // عرض جدران البيع (نفس تصميم كودك)
                document.getElementById('s-walls').innerHTML = d.a.slice(0,4).map(w => `
                    <div class="wall-row"><span>$${parseFloat(w[0]).toLocaleString()}</span><span class="perc-tag">${(Math.random()*5+1).toFixed(1)}%</span><span>Vol: ${(parseFloat(w[0])*parseFloat(w[1])/1000000).toFixed(2)}M</span></div>
                `).join('');

                // عرض جدران الشراء
                document.getElementById('b-walls').innerHTML = d.b.slice(0,4).map(w => `
                    <div class="wall-row"><span>$${parseFloat(w[0]).toLocaleString()}</span><span class="perc-tag">${(Math.random()*5+1).toFixed(1)}%</span><span>Vol: ${(parseFloat(w[0])*parseFloat(w[1])/1000000).toFixed(2)}M</span></div>
                `).join('');
            };
        }

        function closeRadar() {
            if(ws) ws.close();
            document.getElementById('main-screen').style.display = 'block';
            document.getElementById('radar-screen').style.display = 'none';
        }

        function filterAlpha() {
            const q = document.getElementById('searchInput').value.toUpperCase();
            renderList(allAlpha.filter(c => c.symbol.includes(q)));
        }

        setInterval(scanAlpha, 5000);
        scanAlpha();
    </script>
</body>
</html>
